<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poomsae Scoring System</title>
  <link href="/fonts/fonts.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      user-select: none; -webkit-user-select: none;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 12px;
      color: #c9a84c; text-shadow: 0 0 40px rgba(201,168,76,0.35); line-height: 1; }
    .sub { font-size: 10px; font-weight: 700; letter-spacing: 6px; color: #555;
      text-transform: uppercase; margin-top: 2px; margin-bottom: 36px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 520px; }
    .card {
      background: #141414; border: 1px solid #222; border-radius: 16px;
      padding: 26px 18px; text-align: center; cursor: pointer; text-decoration: none;
      color: #fff; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .card:hover { border-color: #c9a84c; background: #16130a; transform: translateY(-2px); }
    .card:active { transform: translateY(0); }
    .card-icon { font-size: 34px; line-height: 1; }
    .card-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: #c9a84c; }
    .card-desc { font-size: 10px; color: #777; letter-spacing: 0.5px; line-height: 1.4; }
    .footer { margin-top: 32px; font-size: 9px; letter-spacing: 2px; color: #2a2a2a; text-transform: uppercase; }
    @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } .logo { font-size: 48px; letter-spacing: 8px; } }
  </style>
</head>
<body>

  <div class="logo">POOMSAE</div>
  <div class="sub">Sistema de Calificación</div>

  <div class="grid">
    <a class="card" href="/mesa.html">
      <div class="card-icon">🥋</div>
      <div class="card-titulo">Mesa Competencia</div>
      <div class="card-desc">1v1 simultáneo, secuencial y cut off</div>
    </a>

    <a class="card" href="/liga.html">
      <div class="card-icon">📋</div>
      <div class="card-titulo">Mesa Liga</div>
      <div class="card-desc">Carga por Excel · corrida continua por grupos</div>
    </a>

    <a class="card" href="/juez.html">
      <div class="card-icon">⚖️</div>
      <div class="card-titulo">Juez</div>
      <div class="card-desc">Calificar desde el móvil</div>
    </a>

    <a class="card" href="/pantalla.html">
      <div class="card-icon">📺</div>
      <div class="card-titulo">Pantalla</div>
      <div class="card-desc">Resultados para el público</div>
    </a>
  </div>

  <div style="margin-top:24px; display:flex; gap:10px">
    <a id="link-admin" href="/admin.html" style="display:none; font-size:11px; letter-spacing:1px; color:#c9a84c; border:1px solid #3a3000; border-radius:8px; padding:7px 14px; text-decoration:none">⚙ Administración</a>
    <button onclick="cerrarSesion()" style="font-size:11px; letter-spacing:1px; color:#888; background:none; border:1px solid #2a2a2a; border-radius:8px; padding:7px 14px; cursor:pointer">Cerrar sesión</button>
  </div>

  <div class="footer">Henry Sigchos Taekwondo · HSTKD</div>

  <script>
    // Mostrar "Administración" solo si el usuario es admin
    fetch('/api/me').then(r => r.ok ? r.json() : null).then(u => {
      if (u && u.role === 'admin') document.getElementById('link-admin').style.display = 'inline-block';
    }).catch(() => {});
    async function cerrarSesion() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }
  </script>

</body>
</html>
