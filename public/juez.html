<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Juez - Poomsae</title>
  <link href="/fonts/fonts.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d; color: white;
      font-family: 'Inter', sans-serif;
      height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    .header {
  padding: 2px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  border-bottom: 1px solid #1a1a1a;
}
    .header-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: #c9a84c;
}
    .juez-badge {
      font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px;
      padding: 3px 12px; border-radius: 20px;
      border: 1px solid #c9a84c; background: #1a1500; color: #c9a84c;
    }

    /* ── OVERLAYS ── */
    .overlay-full {
      position: fixed; inset: 0; background: #0d0d0d;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 14px; padding: 24px; z-index: 999;
      overflow-y: auto;
    }
    .overlay-full.hidden { display: none; }
    .overlay-semi {
      position: fixed; inset: 0; background: rgba(0,0,0,0.94);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 12px;
      z-index: 90; padding: 20px;
    }
    .overlay-semi.hidden { display: none; }

    /* ── LOGIN ── */
    .login-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 6px; color: #c9a84c; }
    .login-sub { font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-top: -8px; }
    .login-form { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
    .input-label { font-size: 8px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: -6px; }
    .input-field {
      width: 100%; background: #111; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #fff; padding: 12px 14px;
      font-size: 16px; font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 3px; outline: none; text-align: center;
      touch-action: auto;
    }
    .input-field:focus { border-color: #c9a84c; }
    select.input-field { cursor: pointer; }

    /* ── BOTONES GENERALES ── */
    .btn-gold {
      width: 100%; background: #c9a84c; color: #000; border: none;
      padding: 14px; font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 4px; border-radius: 10px; cursor: pointer;
    }
    .btn-gold:active { filter: brightness(0.85); }
    .btn-confirmar {
      width: 100%; background: #0ea5e9; color: #fff; border: none;
      padding: 16px; font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 4px; border-radius: 10px; cursor: pointer;
      flex-shrink: 0;
    }
    .btn-confirmar:active { filter: brightness(0.85); }
    .btn-enviar {
      width: 100%; background: #16a34a; color: #fff; border: none;
      padding: 16px; font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 4px; border-radius: 10px; cursor: pointer;
      flex-shrink: 0;
    }
    .btn-enviar:active { filter: brightness(0.85); }
    .btn-siguiente {
      width: 90%; max-width: 340px;
      background: #c9a84c; color: #000; border: none;
      padding: 16px; font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 4px; border-radius: 10px; cursor: pointer;
    }
    .btn-siguiente:active { filter: brightness(0.85); }
    .btn-undo {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #555; padding: 7px 14px; border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px;
      cursor: pointer; touch-action: manipulation; flex-shrink: 0;
    }
    .btn-undo:active { border-color: #c9a84c; color: #c9a84c; }

    /* ── PANEL PRINCIPAL ── */
    #panel-calificacion {
      display: none; flex: 1;
      overflow: hidden; /* el scroll lo maneja el hijo */
      flex-direction: column;
    }
    #panel-calificacion.visible { display: flex; }

    /* ── CONTENEDOR PASO ── */
    /* PRECISIÓN: llena la pantalla, NO scrollea */
    .paso-prec {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 4px 6px;
  min-height: 0;
}
    /* PRESENTACIÓN: scrollea */
    .paso-pres {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 8px 10px 30px;
    }

    /* ── COMP HEADER ── */
    .comp-header {
  background: #141414;
  border: 1px solid #222;
  border-radius: 8px;
  padding: 2px 8px;
  margin-bottom: 2px;
  text-align: center;
  flex-shrink: 0;
}
    .comp-tipo { font-size: 6px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 0px; }
   .comp-nombre {font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; line-height: 1;
}
    .paso-label {
      text-align: center; font-size: 9px; font-weight: 700;
      letter-spacing: 4px; color: #555; text-transform: uppercase;
      margin-bottom: 8px; flex-shrink: 0;
    }

    /* ════════════════════════════════════
       PRECISIÓN — 1V1 SIMULTÁNEO
       Vertical: 2 columnas
       Horizontal: 2 columnas con más espacio
    ════════════════════════════════════ */
    .prec-grid {
      flex: 1; display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px; min-height: 0;
    }
    .prec-col {
      display: flex; flex-direction: column;
      border-radius: 14px; overflow: hidden; min-height: 0;
    }
    .prec-col.rojo { background: #180000; border: 1px solid #3d0000; }
    .prec-col.azul { background: #00001a; border: 1px solid #00003d; }

    .prec-col-header {
  padding: 2px;
  text-align: center;
  flex-shrink: 0;
}
    .prec-col-nombre {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  line-height: 1;
}
    .prec-col.rojo .prec-col-nombre { color: #ff6666; }
    .prec-col.azul .prec-col-nombre { color: #6699ff; }

    .prec-score {
      font-family: 'Bebas Neue', sans-serif; font-size: 28px;
      letter-spacing: 2px; line-height: 1; color: #c9a84c;
      text-align: center; padding: 4px 0;
      text-shadow: 0 0 16px rgba(201,168,76,0.3);
      flex-shrink: 0;
    }

    /* Botones deducción: llenan el espacio restante */
    .prec-btns {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 2px;
  min-height: 0;
}
    .btn-ded {
      flex: 1; width: 100%; border: none; border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      cursor: pointer; min-height: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform 0.08s, filter 0.08s;
    }
    .btn-ded:active { transform: scale(0.95); filter: brightness(1.4); }
    .btn-ded-val { font-size: 32px; letter-spacing: 2px; line-height: 1; }
    .btn-ded-sub { font-size: 10px; letter-spacing: 2px; opacity: 0.65; margin-top: 3px; text-transform: uppercase; }

    .btn-ded.rojo-grande { background: linear-gradient(135deg,#6b0000,#dc2626); color: #fff; border: 1px solid #ef4444; }
    .btn-ded.rojo-chico  { background: linear-gradient(135deg,#420000,#991b1b); color: #ffbbbb; border: 1px solid #7f1d1d; }
    .btn-ded.azul-grande { background: linear-gradient(135deg,#00006b,#3b82f6); color: #fff; border: 1px solid #60a5fa; }
    .btn-ded.azul-chico  { background: linear-gradient(135deg,#000042,#1e40af); color: #bbccff; border: 1px solid #1d4ed8; }

    .prec-undo-row {
      display: flex; justify-content: center; padding: 0 6px 6px;
      flex-shrink: 0;
    }

       /* Landscape: los botones son aún más anchos */
@media (orientation: landscape) {

  .header {
    padding: 1px 10px;
    max-height: 24px;
    min-height: 0;
  }
  .header-logo { font-size: 11px; letter-spacing: 2px; }
  .juez-badge  { font-size: 10px; padding: 1px 7px; border-radius: 10px; }

  #panel-calificacion {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .paso-prec {
    padding: 2px 6px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
    gap: 2px;
    height: 100%;
    overflow: hidden;
  }

  .comp-header {
    padding: 1px 8px;
    margin-bottom: 0;
    border-radius: 5px;
  }
  .comp-tipo   { display: none; }
  .comp-nombre { font-size: 11px; letter-spacing: 1px; line-height: 1; }
  .paso-label  { display: none; }

  .prec-grid {
    min-height: 0;
    height: 100%;
    gap: 5px;
    overflow: hidden;
  }

  .prec-col {
    min-height: 0;
    overflow: hidden;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
  }

  .prec-col-header {
    flex-shrink: 0;
    padding: 1px 4px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .prec-col-nombre { font-size: 10px; letter-spacing: 1px; line-height: 1; }
  .prec-score {
    font-size: 14px;
    padding: 0;
    line-height: 1;
    text-shadow: none;
  }

  .prec-btns {
    flex: 1;
    min-height: 0;
    gap: 3px;
    padding: 2px 3px;
  }
  .btn-ded {
    flex: 1;
    min-height: 0;
    border-radius: 8px;
  }
  .btn-ded-val { font-size: clamp(24px, 5vh, 48px); line-height: 1; }
  .btn-ded-sub { font-size: clamp(8px, 1.2vh, 11px); margin-top: 1px; letter-spacing: 1px; }

  .prec-undo-row {
    flex-shrink: 0;
    padding: 2px 3px;
  }
  .btn-undo { font-size: 9px; padding: 2px 8px; border-radius: 4px; }

  .btn-confirmar {
    flex-shrink: 0;
    padding: 6px;
    font-size: 13px;
    letter-spacing: 3px;
    border-radius: 7px;
    margin-top: 0;
  }

  .prec-normal {
    flex: 1;
    min-height: 0;
    gap: 3px;
  }
  .prec-normal-score {
    font-size: 20px !important;
    padding: 0;
    line-height: 1;
    text-shadow: none;
  }
  .prec-normal-max { font-size: 12px; }

  .prec-normal-btns {
    flex: 1;
    min-height: 0;
    gap: 4px;
  }
  .btn-ded-normal {
    min-height: 0 !important;
    flex: 1;
    border-radius: 10px;
    gap: 2px;
  }
  .btn-ded-normal-val { font-size: clamp(24px, 5vh, 48px); line-height: 1; }
  .btn-ded-normal-sub { font-size: clamp(8px, 1.2vh, 11px); letter-spacing: 1px; }

  .prec-normal-footer {
    flex-shrink: 0;
    gap: 6px;
  }
  .btn-reset-prec { padding: 5px; font-size: 8px; }
}



    /* ════════════════════════════════════
       PRECISIÓN — NORMAL (cutoff/secuencial)
       Botones que llenan toda la pantalla
    ════════════════════════════════════ */
    .prec-normal {
      flex: 1; display: flex; flex-direction: column;
      gap: 8px; min-height: 0;
    }
    .prec-normal-score {
      text-align: center; flex-shrink: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px; letter-spacing: 4px; color: #c9a84c; line-height: 1;
      text-shadow: 0 0 30px rgba(201,168,76,0.4);
      padding: 4px 0;
    }
    .prec-normal-max {
      font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #444;
    }
    .prec-normal-btns {
      flex: 1; display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px; min-height: 0;
      overflow: hidden;
    }
    .btn-ded-normal {
      flex: 1; border-radius: 16px; border: none;
      font-family: 'Bebas Neue', sans-serif;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform 0.08s, filter 0.08s;
      min-height: 120px;
    }
    .btn-ded-normal:active { transform: scale(0.95); filter: brightness(1.4); }
    .btn-ded-normal.grande { background: linear-gradient(135deg,#2a2a2a,#f0f0f0); color: #111; border: 1px solid #ccc; }
    .btn-ded-normal.chico  { background: linear-gradient(135deg,#1a1a1a,#b0b0b0); color: #222; border: 1px solid #888; }
    .btn-ded-normal-val { font-size: 40px; letter-spacing: 2px; line-height: 1; }
    .btn-ded-normal-sub { font-size: 11px; letter-spacing: 2px; opacity: 0.65; text-transform: uppercase; }

    .prec-normal-footer {
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .btn-reset-prec {
      flex: 1; background: none; border: 1px solid #1a1a1a;
      color: #444; padding: 10px; border-radius: 8px;
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer;
    }
    .btn-reset-prec:active { border-color: #c9a84c; color: #c9a84c; }

/* second landscape block merged above */


    /* ════════════════════════════════════
       PRESENTACIÓN — scrolleable
    ════════════════════════════════════ */
    .pres-bloque {
      border-radius: 12px; padding: 12px; margin-bottom: 10px;
    }
    .pres-bloque.rojo { background: #110000; border: 1px solid #2a0000; }
    .pres-bloque.azul { background: #00001a; border: 1px solid #00002a; }
    .pres-bloque.neutro { background: #141414; border: 1px solid #222; }
    .pres-bloque-titulo {
      font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px;
      margin-bottom: 10px; text-align: center;
    }
    .pres-bloque.rojo .pres-bloque-titulo { color: #ff6666; }
    .pres-bloque.azul .pres-bloque-titulo { color: #6699ff; }
    .pres-bloque.neutro .pres-bloque-titulo { color: #c9a84c; }

    .modulo { margin-bottom: 12px; }
    .modulo:last-child { margin-bottom: 0; }
    .modulo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .modulo-nombre { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: #666; text-transform: uppercase; }
    .modulo-valor { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: #c9a84c; }
    .modulo-slider {
      width: 100%; height: 12px; accent-color: #c9a84c;
      cursor: pointer; border-radius: 4px;
      touch-action: auto; /* permitir deslizar */
    }
    .modulo-rangos { display: flex; justify-content: space-between; font-size: 8px; color: #444; margin-top: 4px; }
    hr.sep { border: none; border-top: 1px solid #1e1e1e; margin: 10px 0; }

    .subtotal-pres {
      background: #0a0a0a; border: 1px solid #333;
      border-radius: 8px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px;
    }
    .subtotal-label { font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; }
    .subtotal-valor { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: #c9a84c; }

    /* ── RESUMEN ── */
    .resumen-card {
      background: #141414; border: 1px solid #222;
      border-radius: 14px; padding: 20px; width: 90%; max-width: 340px;
    }
    .resumen-titulo {
      font-family: 'Bebas Neue', sans-serif; font-size: 13px;
      letter-spacing: 4px; color: #555; text-align: center; margin-bottom: 14px;
    }
    .resumen-fila {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #1a1a1a;
    }
    .resumen-fila:last-child { border-bottom: none; }
    .resumen-nombre { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; }
    .resumen-puntaje { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; color: #c9a84c; }
    .resumen-sub { font-size: 9px; color: #555; letter-spacing: 1px; margin-top: 2px; }

    .hidden { display: none; }

    /* ── CONTROLES BLOQUEADOS ── */
    .controles-bloqueados .btn-ded,
    .controles-bloqueados .btn-ded-normal,
    .controles-bloqueados .btn-confirmar,
    .controles-bloqueados .btn-enviar {
      opacity: 0.25 !important;
      pointer-events: none !important;
    }
    .overlay-espera-info {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 3px; color: #333;
      text-align: center; padding: 6px 12px;
      background: #111; border: 1px solid #1a1a1a;
      border-radius: 8px; max-width: 280px;
    }
    option:disabled { color: #555; }
        /* ── FREESTYLE ── */
    .fs-criterio { margin-bottom: 10px; }
    .fs-crit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .fs-btn-row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
    .fs-btn {
      padding: 11px 0; background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #777; border-radius: 6px; font-family: 'Bebas Neue', sans-serif;
      font-size: 12px; letter-spacing: 0.5px; cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .fs-btn.sel { background: #c9a84c; color: #000; border-color: #c9a84c; font-weight: 700; }
    .controles-bloqueados .fs-btn { opacity: 0.25 !important; pointer-events: none !important; }

  </style>
</head>
<body>

<!-- LOGIN -->
<div class="overlay-full" id="overlay-login">
  <div class="login-titulo">POOMSAE</div>
  <div class="login-sub">Sistema de Calificación</div>
  <div class="login-form">
    <div class="input-label">Código de Sala</div>
    <input class="input-field" id="input-sala" type="text" maxlength="8" aria-label="Código de sala" placeholder="SALA01" style="text-transform:uppercase">
    <div class="input-label">Tu Nombre</div>
    <input class="input-field" id="input-nombre" type="text" aria-label="Tu nombre" placeholder="NOMBRE" style="font-size:14px;letter-spacing:2px">
    <div class="input-label">Posición</div>
    <select class="input-field" id="input-numjuez" aria-label="Posición del juez">
      <option value="1">JUEZ 1</option><option value="2">JUEZ 2</option>
      <option value="3">JUEZ 3</option><option value="4">JUEZ 4</option>
      <option value="5">JUEZ 5</option><option value="6">JUEZ 6</option>
      <option value="7">JUEZ 7</option>
    </select>
    <div id="login-error" style="display:none;background:#1a0505;border:1px solid #7f1d1d;border-radius:8px;padding:8px 12px;font-size:11px;color:#ff8888;text-align:center"></div>
    <button class="btn-gold" onclick="conectarse()">CONECTAR</button>
  </div>
</div>

<!-- ESPERA -->
<div class="overlay-semi" id="overlay-espera">
  <div style="font-size:44px">⏸</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:#c9a84c">ESPERANDO TURNO</div>
  <div style="font-size:9px;letter-spacing:3px;color:#444;text-transform:uppercase">Espera la señal de la mesa</div>
</div>

<!-- RESUMEN ENVIADO -->
<div class="overlay-semi hidden" id="overlay-enviado">
  <div style="font-size:48px">✅</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:#22c55e;margin-bottom:8px">PUNTAJE ENVIADO</div>
  <div id="resumen-contenido"></div>
  <button class="btn-siguiente" onclick="esperarSiguiente()">LISTO →</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">POOMSAE</div>
  <div class="juez-badge" id="juez-badge">—</div>
</div>

<!-- PANEL CALIFICACION -->
<div id="panel-calificacion"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── BLOQUEAR SCROLL / ZOOM ──
  document.addEventListener('touchmove', (e) => {
    const isLandscape = window.innerWidth > window.innerHeight;
    if (isLandscape) return;
    const allowed = e.target.closest('input[type=range]') || e.target.closest('.paso-pres');
    if (!allowed) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  let lastTap = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });

  // ── VIBRACIÓN ──
  function vibrar(tipo) {
    if (navigator.vibrate) {
      navigator.vibrate(tipo === 'suave' ? 60 : [100, 30, 100]);
      return;
    }
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const dur = tipo === 'suave' ? 0.08 : 0.18;
      osc.frequency.value = tipo === 'suave' ? 80 : 40;
      gain.gain.setValueAtTime(tipo === 'suave' ? 0.3 : 0.6, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  // ── ORIENTACIÓN DE COLORES (precisión) ──
  // Reglamento: mayoría de jueces tiene Azul-izq / Rojo-der
  // La minoría tiene orientación invertida (Rojo-izq / Azul-der)
  // 3 jueces: J1,J2 normal → J3 invertido
  // 5 jueces: J1,J2,J3 normal → J4,J5 invertido
  // 7 jueces: J1,J2,J3,J4 normal → J5,J6,J7 invertido
  function esPrecisionInvertida(numJuez, totalJueces) {
    if (totalJueces === 3) return numJuez === 3;
    if (totalJueces === 5) return numJuez >= 4;
    if (totalJueces === 7) return numJuez >= 5;
    return false; // default normal
  }

  const socket = io();
  let salaInfo = {}, numJuez = 1, turnoActual = null;
  // Sesión del juez persistida para reingresar solo tras cambiar de app / reconectar
  let juezCodigo = '', juezNombre = '';
  function guardarSesionJuez() {
    try { localStorage.setItem('juezSesion', JSON.stringify({ codigo: juezCodigo, nombre: juezNombre, numJuez })); } catch (e) {}
  }
  function limpiarSesionJuez() {
    juezCodigo = '';
    try { localStorage.removeItem('juezSesion'); } catch (e) {}
  }
  function reingresarJuez() {
    if (juezCodigo) socket.emit('juez-unirse', { codigo: juezCodigo, nombre: juezNombre || 'Juez', numJuez });
  }
  (function cargarSesionJuez() {
    try {
      const s = JSON.parse(localStorage.getItem('juezSesion') || 'null');
      if (s && s.codigo) { juezCodigo = s.codigo; juezNombre = s.nombre || 'Juez'; numJuez = s.numJuez || numJuez; }
    } catch (e) {}
  })();
  let precisionVal = { A: 4.0, B: 4.0, C: 4.0 };
  let historialPrec = { A: [], B: [], C: [] };
  let modulosVal = {
    A: { vel: 1.0, rit: 1.0, exp: 1.0 },
    B: { vel: 1.0, rit: 1.0, exp: 1.0 },
    C: { vel: 1.0, rit: 1.0, exp: 1.0 }
  };
  const MODULOS = [
    { id: 'vel', nombre: 'Velocidad y Fuerza' },
    { id: 'rit', nombre: 'Ritmo y Tiempo' },
    { id: 'exp', nombre: 'Expresión de Energía' }
  ];

  function conectarse() {
    const codigo = document.getElementById('input-sala').value.trim().toUpperCase();
    const nombre = document.getElementById('input-nombre').value.trim() || 'Juez';
    numJuez = parseInt(document.getElementById('input-numjuez').value, 10);
    if (!codigo) return alert('Ingresa el código de sala');

    reingresarJuez();
  }

  function resetEstado() {
    precisionVal = { A: 4.0, B: 4.0, C: 4.0 };
    historialPrec = { A: [], B: [], C: [] };
    modulosVal = {
      A: { vel: 1.0, rit: 1.0, exp: 1.0 },
      B: { vel: 1.0, rit: 1.0, exp: 1.0 },
      C: { vel: 1.0, rit: 1.0, exp: 1.0 }

  }

  // ── RENDER PRINCIPAL ──
  function renderCalificacion(turno) {
    turnoActual = turno;
    resetEstado();
    const panel = document.getElementById('panel-calificacion');
    panel.innerHTML = '';

    if (turno.tipo === '1v1-simultaneo') {

  // ── 1V1 SIMULTÁNEO ──
  function renderSimultaneo(panel) {
    // Determinar orientación para precisión
    const totalJueces = salaInfo.numJueces || 3;
    const invertido = esPrecisionInvertida(numJuez, totalJueces);

    // Normal:   Azul(A) izquierda | Rojo(B) derecha
    // Invertido: Rojo(B) izquierda | Azul(A) derecha
    const izqKey   = invertido ? 'B' : 'A';
    const derKey   = invertido ? 'A' : 'B';
    const izqNombre = invertido ? turnoActual.competidorB?.nombre : turnoActual.competidorA?.nombre;
    const derNombre = invertido ? turnoActual.competidorA?.nombre : turnoActual.competidorB?.nombre;

    const derColor  = invertido ? 'azul' : 'rojo';

    panel.innerHTML = `

  function precColHTML(key, nombre, color) {

   function irPresentacion() {

  // ── RENDER UNO (cutoff / secuencial) ──
  function renderUno(panel, comp, sub, key, fase) {

  function irPresentacionUno(key, fase, nombre) {
    // Determine comp — secuencial uses competidorA/B, cutoff uses competidor
    let comp;
    if (turnoActual.tipo === '1v1-secuencial') {
      comp = key === 'B' ? turnoActual.competidorB : turnoActual.competidorA;
    } else if (fase === 'A') comp = turnoActual.competidorA;
    else if (fase === 'B') comp = turnoActual.competidorB;
    else comp = turnoActual.competidor;

    const panel = document.getElementById('panel-calificacion');

      <div class="paso-pres">
        <div class="comp-header" style="margin-bottom:8px">

  // ── HEADER HTML ──
  function headerHTML(tipo, nombre, sub, esSimultaneo) {

  // ── MÓDULOS SLIDERS ──
  function modulosSliders(key) {
    return MODULOS.map(m => `
      <div class="modulo">
        <div class="modulo-header">
          <span class="modulo-nombre">${m.nombre}</span>

          id="slider-${key}-${m.id}"
          min="5" max="20" value="10" step="1"

          oninput="actualizarModulo('${key}','${m.id}',this.value)">
        <div class="modulo-rangos">
          <span>0.5</span><span>1.0</span><span>1.5</span><span>2.0</span>

  // ── LÓGICA ──
  let ultimaDed = 0;
  function dedClick(key, cantidad, e) {
    if (e && e.type === 'click' && e.isTrusted && (Date.now() - ultimaDed) < 300) return;
    ultimaDed = Date.now();
    deducir(key, cantidad);
  }

  function deducir(key, cantidad) {
    historialPrec[key].push(precisionVal[key]);
    let val = Math.round((precisionVal[key] - cantidad) * 10) / 10;
    precisionVal[key] = Math.max(0, val);
    const el = document.getElementById(`prec-val-${key}`);
    if (el) el.textContent = precisionVal[key].toFixed(1);
    vibrar(cantidad === 0.1 ? 'suave' : 'fuerte');
  }

  function undo(key) {
    if (!historialPrec[key].length) return;
    precisionVal[key] = historialPrec[key].pop();
    const el = document.getElementById(`prec-val-${key}`);
    if (el) el.textContent = precisionVal[key].toFixed(1);
    vibrar('suave');
  }

  function resetPrecision(key) {
    historialPrec[key] = [];
    precisionVal[key] = 4.0;
    const el = document.getElementById(`prec-val-${key}`);
    if (el) el.textContent = '4.0';
  }

  function actualizarModulo(key, modId, raw) {
    const val = parseInt(raw, 10) / 10;
    modulosVal[key][modId] = val;
    const el = document.getElementById(`mod-val-${key}-${modId}`);
    if (el) el.textContent = val.toFixed(1);
    actualizarSubtotal(key);
  }

  function actualizarSubtotal(key) {
    const pres = Math.round(Object.values(modulosVal[key]).reduce((s,v) => s+v, 0) * 100) / 100;
    const el = document.getElementById(`subtotal-${key}`);
    if (el) el.textContent = pres.toFixed(1);
  }

  function getValores(key) {
    return {
      precision: precisionVal[key] || 0,
      presentacion: Math.round(Object.values(modulosVal[key]).reduce((s,v) => s+v, 0) * 100) / 100
    };
  }


  function mostrarResumen(resultados) {
    document.getElementById('panel-calificacion').style.display = 'none';

  function esperarSiguiente() {
    document.getElementById('overlay-enviado').classList.add('hidden');
    document.getElementById('overlay-espera').classList.remove('hidden');
  }


  // ── ENVIAR PRECISIÓN (al confirmar paso 1) ──
  function enviarPrecision(key, comp) {
    if (!comp) return;
    socket.emit('juez-precision', {
      codigo: salaInfo.codigo,
      competidorId: comp.id,
      precision: precisionVal[key] || 0,
      poomsae: poomsaeActiva
    });
    precisionConfirmada[key] = true;
  }

  // ── ENVIAR PUNTAJE COMPLETO (precisión + presentación) — simultáneo ──
  function enviarAmbos() {
    const vA = getValores('A'), vB = getValores('B');
    const mA = modulosVal['A'], mB = modulosVal['B'];
    const compA = turnoActual.competidorA;
    const compB = turnoActual.competidorB;
    if (!compA || compA.id === undefined || !compB || compB.id === undefined) {
      console.error('Competidores inválidos:', compA, compB); return;
    }
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo, competidorId: compA.id,
      precision: vA.precision, presentacion: vA.presentacion,
      desglose: { prec: vA.precision, vel: mA.vel, rit: mA.rit, exp: mA.exp },
      poomsae: poomsaeActiva
    });
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo, competidorId: compB.id,
      precision: vB.precision, presentacion: vB.presentacion,
      desglose: { prec: vB.precision, vel: mB.vel, rit: mB.rit, exp: mB.exp },
      poomsae: poomsaeActiva
    });
    mostrarResumen([
      { nombre: compA.nombre, ...vA },
      { nombre: compB.nombre, ...vB }
    ]);
  }

  // ── ENVIAR PUNTAJE COMPLETO — individual (cutoff / secuencial) ──
  function enviarUno(key, fase) {
    const comp = fase === 'A' ? turnoActual.competidorA
               : fase === 'B' ? turnoActual.competidorB
               : turnoActual.competidor;
    if (!comp || comp.id === undefined) { console.error('Comp inválido:', comp); return; }
    const v = getValores(key), m = modulosVal[key];
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo, competidorId: comp.id,
      precision: v.precision, presentacion: v.presentacion,
      desglose: { prec: v.precision, vel: m.vel, rit: m.rit, exp: m.exp },
      poomsae: poomsaeActiva
    });
    mostrarResumen([{ nombre: comp.nombre, ...v }]);
  }

    // ── FREESTYLE ──
  const FS_TECNICA = [
    { id: 'yop',     nombre: 'Yop Chagui en salto' },
    { id: 'mult',    nombre: 'Patadas múltiples en salto' },
    { id: 'giro',    nombre: 'Giros en salto con patada' },
    { id: 'combate', nombre: 'Combinación de combate' },
    { id: 'acro',    nombre: 'Acrobacia con patada' },
    { id: 'basico',  nombre: 'Mov. básicos y practicidad' }
  ];
  const FS_PRES = [
    { id: 'crea', nombre: 'Creatividad' },
    { id: 'arm',  nombre: 'Armonía' },
    { id: 'expr', nombre: 'Expresión de la energía' },
    { id: 'mus',  nombre: 'Música y coreografía' }
  ];
  let fsVals = {};

  function fsCriterioHTML(c) {
    return `
      <div class="fs-criterio">
        <div class="fs-crit-header">
          <span class="modulo-nombre">${c.nombre}</span>

  function renderFreestyle(panel, comp, sub) {
    fsVals = {};
    panel.innerHTML = `
      <div class="paso-pres">
        ${headerHTML(sub || 'Freestyle', comp?.nombre, null, false)}
        <div class="paso-label">FREESTYLE · TRANSCRIBE TU HOJA</div>

        </div>
        <div class="pres-bloque neutro" style="margin-top:10px">
          <div class="pres-bloque-titulo">PRESENTACIÓN · <span id="fs-sub-pres">0.0</span> / 4.0</div>
          ${FS_PRES.map(fsCriterioHTML).join('<hr class="sep">')}
        </div>
        <div class="subtotal-pres" style="margin-top:12px">
          <span class="subtotal-label">Total</span>
          <span class="subtotal-valor" id="fs-total">0.00</span>

        <button class="btn-enviar" id="btn-enviar-fs" style="margin-top:12px;opacity:0.25;pointer-events:none"
          onclick="enviarFreestyle()">ENVIAR CALIFICACIÓN</button>
        <div id="fs-faltan" style="text-align:center;font-size:9px;letter-spacing:2px;color:#555;margin-top:6px;text-transform:uppercase">
          Completa los 10 criterios para enviar
        </div>
      </div>`;
  }

  function fsSet(id, val) {
    fsVals[id] = val;
    document.getElementById(`fs-val-${id}`).textContent = val.toFixed(1);
    for (let i = 1; i <= 10; i++) {
      document.getElementById(`fs-btn-${id}-${i}`)?.classList.toggle('sel', i === Math.round(val * 10));
    }
    const tec  = Math.round(FS_TECNICA.reduce((s, c) => s + (fsVals[c.id] || 0), 0) * 100) / 100;
    const pres = Math.round(FS_PRES.reduce((s, c) => s + (fsVals[c.id] || 0), 0) * 100) / 100;
    document.getElementById('fs-sub-tec').textContent  = tec.toFixed(1);
    document.getElementById('fs-sub-pres').textContent = pres.toFixed(1);
    document.getElementById('fs-total').textContent    = (tec + pres).toFixed(2);

    const completo = [...FS_TECNICA, ...FS_PRES].every(c => fsVals[c.id] !== undefined);
    const btn = document.getElementById('btn-enviar-fs');
    if (btn) { btn.style.opacity = completo ? '1' : '0.25'; btn.style.pointerEvents = completo ? 'auto' : 'none'; }
    const falta = document.getElementById('fs-faltan');
    if (falta) falta.style.display = completo ? 'none' : 'block';
    vibrar('suave');
  }

  function enviarFreestyle() {
    const comp = turnoActual?.competidor;
    if (!comp || comp.id === undefined) { console.error('Comp inválido:', comp); return; }
    const tec  = Math.round(FS_TECNICA.reduce((s, c) => s + (fsVals[c.id] || 0), 0) * 100) / 100;
    const pres = Math.round(FS_PRES.reduce((s, c) => s + (fsVals[c.id] || 0), 0) * 100) / 100;
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo, competidorId: comp.id,
      precision: tec, presentacion: pres,
      desglose: { prec: tec, vel: pres, rit: 0, exp: 0 },
      poomsae: 1
    });
    mostrarResumen([{ nombre: comp.nombre, precision: tec, presentacion: pres }]);
  }

  // ── ESTADO DE CALIFICACIÓN ──
  let precisionBloqueada = true;
  let controlesHabilitados = false; // solo true después de competencia-iniciada + iniciar crono
  let poomsaeActiva = 1;
  let precisionConfirmada = { A: false, B: false, C: false };

  // ── BLOQUEAR / HABILITAR CONTROLES ──
  function bloquearControles() {
    controlesHabilitados = false;
    document.getElementById('panel-calificacion').classList.add('controles-bloqueados');
    document.querySelectorAll('.btn-ded, .btn-ded-normal').forEach(btn => {
      btn.style.opacity = '0.25';
      btn.style.pointerEvents = 'none';
    });
  }

  function habilitarControlesPrecision() {
    controlesHabilitados = true;
    precisionBloqueada = false;
    document.getElementById('panel-calificacion').classList.remove('controles-bloqueados');
    document.querySelectorAll('.btn-ded, .btn-ded-normal').forEach(btn => {
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    });
    document.querySelectorAll('.btn-confirmar').forEach(btn => {
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    });
  }

  function bloquearSoloPrecision() {
    precisionBloqueada = true;
    document.querySelectorAll('.btn-ded, .btn-ded-normal').forEach(btn => {
      btn.style.opacity = '0.25';
      btn.style.pointerEvents = 'none';
    });
    document.querySelectorAll('.btn-confirmar').forEach(btn => {
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    });
  }

  // ── ACTUALIZAR SELECT DE POSICIONES ──
  function actualizarSelectJueces(ocupados) {
    const sel = document.getElementById('input-numjuez');
    if (!sel) return;
    Array.from(sel.options).forEach(opt => {
      const num = parseInt(opt.value, 10);
      if (ocupados.includes(num)) {
        opt.disabled = true;
        opt.textContent = `JUEZ ${num} — Conectado`;
      } else {
        opt.disabled = false;
        opt.textContent = `JUEZ ${num}`;
      }
    });
  }

  // ── RESTAURAR PANTALLA SEGÚN FASE (al reconectar) ──
  function restaurarEstadoPorFase(sala) {
    const fase = sala.faseActual || 'sorteo';
    const panel = document.getElementById('panel-calificacion');

    // Si no hay competencia activa, mostrar espera informativa
    if (sala.estado !== 'activo' || !sala.competidores.length) {
      mostrarEsperaConInfo(sala.categoria, sala.ronda, null);
      return;
    }

    const turno = buildTurnoLocal(sala);
    if (!turno) { mostrarEsperaConInfo(sala.categoria, sala.ronda, null); return; }

    if (['p1_corriendo', 'p1_detenido', 'p2_corriendo', 'p2_detenido'].includes(fase)) {
      // Renderizar panel de calificación
      poomsaeActiva = fase.startsWith('p2') ? 2 : 1;
      turnoActual = turno;
      resetEstado();
      panel.innerHTML = '';
      renderSimultaneo(panel);
      document.getElementById('overlay-espera').classList.add('hidden');
      panel.classList.add('visible');
      panel.style.display = 'flex';

      if (fase === 'p1_corriendo' || fase === 'p2_corriendo') {
        habilitarControlesPrecision();
      } else {
        // detenido: bloquear solo botones de deducción
        bloquearSoloPrecision();
      }
    } else if (fase === 'p2_listo') {
      poomsaeActiva = 2;
      mostrarEsperaConInfo(sala.categoria, sala.ronda, sala.poomsae2, '2DA POOMSAE');
    } else {
      // sorteo, p1_listo, resultado
      mostrarEsperaConInfo(sala.categoria, sala.ronda,
        fase === 'p1_listo' ? sala.poomsae1 : null,
        fase === 'p1_listo' ? '1RA POOMSAE · LISTA' : 'ESPERANDO TURNO');
    }
  }

  function mostrarEsperaConInfo(categoria, ronda, poomsae, titulo) {
    const espera = document.getElementById('overlay-espera');
    const tit = titulo || 'ESPERANDO TURNO';
    espera.innerHTML = `
      <div style="font-size:36px">⏸</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:#c9a84c">${tit}</div>
      ${poomsae ? `<div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:#fff">${poomsae}</div>` : ''}
      <div style="font-size:9px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-top:4px">${categoria || ''} · ${ronda || ''}</div>`;
    espera.classList.remove('hidden');
  }

  // Construir objeto turno localmente desde sala info (para reconexión)
  function buildTurnoLocal(sala) {
    const ti = sala.turnoIndex || 0;
    const modo = sala.modo;
    if (modo === '1v1-simultaneo') {
      return {
        tipo: '1v1-simultaneo',
        competidorA: sala.competidores[ti] || null,
        competidorB: sala.competidores[ti + 1] || null,
      };
    }
    return null;
  }

  // ── SOCKET ──
  socket.on('juez-ok', (data) => {
    salaInfo = data.sala;
    if (data.sala && data.sala.codigo) { juezCodigo = data.sala.codigo; guardarSesionJuez(); }
    document.getElementById('overlay-login').classList.add('hidden');
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('juez-badge').textContent = 'JUEZ ' + numJuez;

    // Bloquear controles hasta que Mesa inicie (item 3)
    bloquearControles();

    // Restaurar pantalla según estado actual de la sala (item 1)
    restaurarEstadoPorFase(data.sala);
  });

  socket.on('error-sala', (d) => {
    // Si falló el reingreso (sala inexistente, etc.), olvidar la sesión guardada
    // para no quedar en un bucle de reintentos y mostrar el login.
    limpiarSesionJuez();
    const err = document.getElementById('login-error');
    if (err) {
      err.textContent = d.msg;
      err.style.display = 'block';
    } else {
      alert(d.msg);
    }
  });

  // Actualizar opciones del select cuando otro juez se conecta/desconecta (item 2)
  socket.on('juez-conectado', (d) => {
    if (d.juecesOcupados) actualizarSelectJueces(d.juecesOcupados);
  });
  socket.on('juez-desconectado', (d) => {
    if (d.juecesOcupados) actualizarSelectJueces(d.juecesOcupados);
  });

  socket.on('competencia-iniciada', (d) => {
    salaInfo.tipo  = d.tipo;
    salaInfo.modo  = d.modo;   // guardar modo como fuente de verdad
    salaInfo.competidores = d.competidores;
    salaInfo.estado = 'activo';
    // Controles siguen bloqueados hasta que Mesa presione INICIAR crono
  });

  socket.on('turno-actualizado', (d) => {
    renderCalificacion(d.turno);
    // Aplicar bloqueo inicial al renderizar
    if (!controlesHabilitados) bloquearControles();
  });

  socket.on('control-actualizado', (data) => {
    if (data.accion === 'iniciar') {
      precisionConfirmada = { A: false, B: false, C: false };
      if (data.poomsaeNum) poomsaeActiva = data.poomsaeNum;
      else poomsaeActiva = (data.fase && data.fase.startsWith('p2')) ? 2 : 1;

      document.getElementById('overlay-espera').classList.add('hidden');

      const panel = document.getElementById('panel-calificacion');
      // Determinar modo — usar salaInfo.modo como fuente de verdad, no turnoActual.tipo
      const modoActual = salaInfo.modo || (turnoActual?.tipo);
      const esSecuencial = modoActual === '1v1-secuencial';
      const esCutoff = modoActual === 'cutoff'

      // Siempre re-renderizar en secuencial (cada atleta es distinto)
      // En simultáneo solo re-renderizar si el panel estaba oculto
      if (esSecuencial) {
        const fase = data.fase || '';
        const esB  = fase.includes('B');
        // turnoActual puede ser null si reconectamos — usar salaInfo como fallback
        const compA = turnoActual?.competidorA || salaInfo.competidores?.[salaInfo.turnoIndex];
        const compB = turnoActual?.competidorB || salaInfo.competidores?.[salaInfo.turnoIndex + 1];
        const comp  = esB ? compB : compA;
        const key   = esB ? 'B' : 'A';
        if (comp) {
          // Asegurar turnoActual tiene datos correctos para enviarPrecision
          if (!turnoActual) turnoActual = {
            tipo: '1v1-secuencial',
            competidorA: compA,
            competidorB: compB
          };
          resetEstado();
          panel.innerHTML = '';
          renderUno(panel, comp, comp.nombre, key, key);
          panel.style.display = 'flex';
          panel.classList.add('visible');
          document.getElementById('overlay-enviado').classList.add('hidden');
          }
        } else if (esCutoff) {
        const comp = turnoActual?.competidor;
        if (comp) {
          resetEstado();
          panel.innerHTML = '';
          if (salaInfo.tipo === 'freestyle') renderFreestyle(panel, comp, 'Freestyle');
          else renderUno(panel, comp, '', 'C', 'C');
          panel.style.display = 'flex';
          panel.classList.add('visible');
          document.getElementById('overlay-enviado').classList.add('hidden');
        }

      } else if (!panel.classList.contains('visible') && turnoActual) {
        resetEstado();
        panel.innerHTML = '';
        renderSimultaneo(panel);
        panel.style.display = 'flex';
        panel.classList.add('visible');
        document.getElementById('overlay-enviado').classList.add('hidden');
      }
      habilitarControlesPrecision();

    } else if (data.accion === 'detener') {
      bloquearSoloPrecision();

    } else if (data.accion === 'nueva-poomsae') {
      const fase = data.fase || '';
      poomsaeActiva = fase.startsWith('p2') ? 2 : 1;
      precisionBloqueada = true;
      controlesHabilitados = false;
      precisionConfirmada = { A: false, B: false, C: false };
      // Limpiar panel completamente para forzar re-render en el siguiente iniciar
      const panel = document.getElementById('panel-calificacion');
      panel.innerHTML = '';
      panel.style.display = 'none';
      panel.classList.remove('visible');
      document.getElementById('overlay-enviado').classList.add('hidden');
      const poomLabel = fase.startsWith('p2') ? '2DA POOMSAE' : '1RA POOMSAE';
      mostrarEsperaConInfo(salaInfo.categoria, salaInfo.ronda, data.poomsae || null, poomLabel);

    } else if (data.accion === 'nueva-competencia') {
      poomsaeActiva = 1;
      precisionBloqueada = true;
      controlesHabilitados = false;
      precisionConfirmada = { A: false, B: false, C: false };
      turnoActual = null;
      document.getElementById('overlay-enviado').classList.add('hidden');
      document.getElementById('panel-calificacion').style.display = 'none';
      document.getElementById('panel-calificacion').classList.remove('visible');
      bloquearControles();
      mostrarEsperaConInfo(salaInfo.categoria, salaInfo.ronda, null, 'ESPERANDO TURNO');

    } else if (data.accion === 'restablecer') {
      habilitarControlesPrecision();
    }
  });

  socket.on('sala-finalizada', () => {
    bloquearControles();
    document.getElementById('overlay-espera').classList.add('hidden');
    document.getElementById('panel-calificacion').style.display = 'none';
    document.getElementById('panel-calificacion').classList.remove('visible');
    document.getElementById('overlay-login').classList.remove('hidden');
    // Limpiar el select de posiciones al salir
    actualizarSelectJueces([]);
    salaInfo = {}; turnoActual = null; limpiarSesionJuez();
  });

  socket.on('sala-eliminada', () => {
    bloquearControles();
    document.getElementById('overlay-espera').classList.add('hidden');
    document.getElementById('panel-calificacion').style.display = 'none';
    document.getElementById('panel-calificacion').classList.remove('visible');
    document.getElementById('overlay-login').classList.remove('hidden');
    actualizarSelectJueces([]);
    salaInfo = {}; turnoActual = null; limpiarSesionJuez();
  });

  socket.on('puntaje-confirmado', (data) => {
    console.log(`✓ Confirmado comp ${data.competidorId} P${data.poomsae}`);
  });

  socket.on('disconnect', () => console.log('Desconectado'));

  // Reingreso automático a la sala en cada (re)conexión del socket.
  // Cubre cuando el juez sale a otra app / atiende una llamada y vuelve.
  socket.on('connect', reingresarJuez);

  // Al volver a primer plano, si el socket se cayó, reconectar (y el evento
  // 'connect' reingresará a la sala). Evita tener que actualizar a mano.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && juezCodigo) {
      if (!socket.connected) socket.connect();
      else reingresarJuez();
    }
  });
</script>
</body>
</html>
