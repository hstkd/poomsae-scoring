<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Juez - Poomsae</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d; color: white;
      font-family: 'Inter', sans-serif;
      min-height: 100dvh; padding: 12px;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid #1a1a1a;
    }
    .header-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 4px; color: #c9a84c;
    }
    .juez-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 3px;
      padding: 4px 14px; border-radius: 20px;
      border: 1px solid #c9a84c;
      background: #1a1500; color: #c9a84c;
    }
    .estado-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-bottom: 16px;
    }
    .estado-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
    .estado-dot.activo { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .estado-txt {
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      color: #444; text-transform: uppercase;
    }
    .estado-txt.activo { color: #22c55e; }

    /* LOGIN */
    .overlay-login {
      position: fixed; inset: 0; background: #0d0d0d;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 14px; padding: 30px; z-index: 999;
    }
    .overlay-login.hidden { display: none; }
    .login-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 5px; color: #c9a84c;
    }
    .login-sub {
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      color: #444; text-transform: uppercase; margin-top: -8px;
    }
    .login-form { width: 100%; max-width: 300px; display: flex; flex-direction: column; gap: 10px; }
    .input-field {
      width: 100%; background: #111; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #fff; padding: 12px 14px;
      font-size: 16px; font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 3px; outline: none; text-align: center;
    }
    .input-field:focus { border-color: #c9a84c; }
    .input-label {
      font-size: 8px; font-weight: 700; letter-spacing: 3px;
      color: #555; text-transform: uppercase; margin-bottom: -6px;
    }
    select.input-field { cursor: pointer; }
    .btn-conectar {
      width: 100%; background: #c9a84c; color: #000;
      border: none; padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 4px;
      border-radius: 10px; cursor: pointer; margin-top: 4px;
    }
    .btn-conectar:active { filter: brightness(0.85); }

    /* ESPERA */
    .overlay-espera {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 10px;
      z-index: 90;
    }
    .overlay-espera.hidden { display: none; }
    .espera-icon { font-size: 40px; }
    .espera-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 4px; color: #555;
    }
    .espera-sub { font-size: 9px; letter-spacing: 3px; color: #333; text-transform: uppercase; }

    /* ENVIADO */
    .overlay-enviado {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 10px;
      z-index: 90;
    }
    .overlay-enviado.hidden { display: none; }
    .enviado-check {
      font-size: 60px; animation: popIn 0.3s ease-out;
    }
    .enviado-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 4px; color: #22c55e;
    }
    .enviado-sub { font-size: 9px; letter-spacing: 3px; color: #555; text-transform: uppercase; }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* PANEL CALIFICACION */
    #panel-calificacion { display: none; }
    #panel-calificacion.visible { display: block; }

    .comp-header {
      background: #141414; border: 1px solid #222;
      border-radius: 10px; padding: 12px 14px;
      margin-bottom: 12px; text-align: center;
    }
    .comp-tipo {
      font-size: 8px; font-weight: 700; letter-spacing: 3px;
      color: #555; text-transform: uppercase; margin-bottom: 4px;
    }
    .comp-nombre {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 3px; color: #fff;
    }
    .vs-tag {
      font-size: 8px; font-weight: 700; letter-spacing: 3px;
      color: #c9a84c; text-transform: uppercase;
      background: #1a1500; border: 1px solid #c9a84c;
      border-radius: 4px; padding: 2px 8px; display: inline-block; margin-top: 4px;
    }

    /* SCORE PANEL */
    .score-panel {
      background: #141414; border: 1px solid #222;
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
    }
    .score-titulo {
      font-size: 8px; font-weight: 700; letter-spacing: 3px;
      color: #555; text-transform: uppercase; margin-bottom: 12px;
    }
    .score-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px; letter-spacing: 4px;
      color: #c9a84c; text-align: center; line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }
    .score-slider {
      width: 100%; height: 6px; margin-bottom: 14px;
      accent-color: #c9a84c; cursor: pointer;
    }
    .score-btns {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    }
    .btn-score {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #888; padding: 11px 4px; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: all 0.1s;
    }
    .btn-score:active { background: #c9a84c; color: #000; border-color: #c9a84c; transform: scale(0.95); }
    .btn-score.reset { grid-column: span 3; color: #444; font-size: 11px; letter-spacing: 2px; }

    .divider {
      border: none; border-top: 1px solid #1a1a1a; margin: 12px 0;
    }

    /* BTN ENVIAR */
    .btn-enviar {
      width: 100%; background: #16a34a; color: #fff;
      border: none; padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 4px;
      border-radius: 10px; cursor: pointer; margin-top: 4px;
    }
    .btn-enviar:active { filter: brightness(0.85); transform: scale(0.99); }
    .btn-enviar.doble { background: #0ea5e9; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="overlay-login" id="overlay-login">
  <div class="login-titulo">POOMSAE</div>
  <div class="login-sub">Sistema de Calificación</div>
  <div class="login-form">
    <div class="input-label">Código de Sala</div>
    <input class="input-field" id="input-sala" type="text" maxlength="8" placeholder="SALA01" style="text-transform:uppercase">
    <div class="input-label">Tu Nombre</div>
    <input class="input-field" id="input-nombre" type="text" placeholder="NOMBRE" style="font-size:14px; letter-spacing:2px">
    <div class="input-label">Posición</div>
    <select class="input-field" id="input-numjuez">
      <option value="1">JUEZ 1</option>
      <option value="2">JUEZ 2</option>
      <option value="3">JUEZ 3</option>
      <option value="4">JUEZ 4</option>
      <option value="5">JUEZ 5</option>
      <option value="6">JUEZ 6</option>
      <option value="7">JUEZ 7</option>
    </select>
    <button class="btn-conectar" onclick="conectarse()">CONECTAR</button>
  </div>
</div>

<!-- ESPERA -->
<div class="overlay-espera" id="overlay-espera">
  <div class="espera-icon">⏸</div>
  <div class="espera-titulo">ESPERANDO TURNO</div>
  <div class="espera-sub">Espera la señal de la mesa</div>
</div>

<!-- ENVIADO -->
<div class="overlay-enviado hidden" id="overlay-enviado">
  <div class="enviado-check">✅</div>
  <div class="enviado-titulo">PUNTAJE ENVIADO</div>
  <div class="enviado-sub">Esperando siguiente turno</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">POOMSAE</div>
  <div class="juez-badge" id="juez-badge">—</div>
</div>
<div class="estado-bar">
  <div class="estado-dot activo" id="estado-dot"></div>
  <div class="estado-txt activo" id="estado-txt">Conectado</div>
</div>

<!-- PANEL CALIFICACION -->
<div id="panel-calificacion">
  <!-- Se rellena dinámicamente -->
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let salaInfo = {};
  let numJuez = 1;
  let turnoActual = null;

  function conectarse() {
    const codigo = document.getElementById('input-sala').value.trim().toUpperCase();
    const nombre = document.getElementById('input-nombre').value.trim() || 'Juez';
    numJuez = parseInt(document.getElementById('input-numjuez').value);
    if (!codigo) return alert('Ingresa el código de sala');
    socket.emit('juez-unirse', { codigo, nombre, numJuez });
  }

  function renderCalificacion(turno) {
    turnoActual = turno;
    const panel = document.getElementById('panel-calificacion');
    const tipo = salaInfo.tipo;
    const labels = tipo === 'freestyle' ? ['DIFICULTAD', 'PRESENTACIÓN'] : ['PRECISIÓN', 'PRESENTACIÓN'];

    if (turno.tipo === '1v1-simultaneo') {
      panel.innerHTML = `
        <div class="comp-header">
          <div class="comp-tipo">Calificación Simultánea</div>
          <div style="display:flex; justify-content:center; align-items:center; gap:12px; margin-top:6px;">
            <span class="comp-nombre">${turno.competidorA?.nombre || '—'}</span>
            <span style="font-family:'Bebas Neue',sans-serif; font-size:18px; color:#333;">VS</span>
            <span class="comp-nombre">${turno.competidorB?.nombre || '—'}</span>
          </div>
        </div>
        <div style="font-size:8px; font-weight:700; letter-spacing:3px; color:#555; text-transform:uppercase; margin-bottom:8px;">
          ${turno.competidorA?.nombre || '—'}
        </div>
        ${scoreBlock(labels[0], 'precision-A')}
        ${scoreBlock(labels[1], 'presentacion-A')}
        <div style="font-size:8px; font-weight:700; letter-spacing:3px; color:#555; text-transform:uppercase; margin: 14px 0 8px;">
          ${turno.competidorB?.nombre || '—'}
        </div>
        ${scoreBlock(labels[0], 'precision-B')}
        ${scoreBlock(labels[1], 'presentacion-B')}
        <button class="btn-enviar doble" onclick="enviarAmbos()">ENVIAR AMBOS PUNTAJES</button>
      `;
    } else if (turno.tipo === '1v1-secuencial') {
      const comp = turno.fase === 'A' ? turno.competidorA : turno.competidorB;
      const faseLabel = turno.fase === 'A' ? 'Primer Competidor' : 'Segundo Competidor';
      panel.innerHTML = `
        <div class="comp-header">
          <div class="comp-tipo">${faseLabel}</div>
          <div class="comp-nombre">${comp?.nombre || '—'}</div>
          <div class="vs-tag">luego → ${turno.fase === 'A' ? turno.competidorB?.nombre : turno.competidorA?.nombre}</div>
        </div>
        ${scoreBlock(labels[0], 'precision-A')}
        ${scoreBlock(labels[1], 'presentacion-A')}
        <button class="btn-enviar" onclick="enviarUno('${turno.fase}')">ENVIAR PUNTAJE</button>
      `;
    } else {
      panel.innerHTML = `
        <div class="comp-header">
          <div class="comp-tipo">${turno.numero} de ${turno.total}</div>
          <div class="comp-nombre">${turno.competidor?.nombre || '—'}</div>
        </div>
        ${scoreBlock(labels[0], 'precision-A')}
        ${scoreBlock(labels[1], 'presentacion-A')}
        <button class="btn-enviar" onclick="enviarUno('C')">ENVIAR PUNTAJE</button>
      `;
    }

    document.getElementById('overlay-espera').classList.add('hidden');
    document.getElementById('overlay-enviado').classList.add('hidden');
    panel.classList.add('visible');
  }

  function scoreBlock(label, id) {
    return `
      <div class="score-panel">
        <div class="score-titulo">${label}</div>
        <div class="score-display" id="val-${id}">4.0</div>
        <input type="range" class="score-slider" id="slider-${id}"
          min="40" max="60" value="40" step="1"
          oninput="actualizarValor('${id}', this.value)">
        <div class="score-btns">
          <button class="btn-score" onclick="ajustar('${id}',-10)">−1.0</button>
          <button class="btn-score" onclick="ajustar('${id}',-5)">−0.5</button>
          <button class="btn-score" onclick="ajustar('${id}',-1)">−0.1</button>
          <button class="btn-score" onclick="ajustar('${id}',+1)">+0.1</button>
          <button class="btn-score" onclick="ajustar('${id}',+5)">+0.5</button>
          <button class="btn-score" onclick="ajustar('${id}',+10)">+1.0</button>
          <button class="btn-score reset" onclick="resetVal('${id}')">RESET 4.0</button>
        </div>
      </div>
    `;
  }

  function actualizarValor(id, rawVal) {
    const val = parseInt(rawVal) / 10;
    document.getElementById('val-' + id).textContent = val.toFixed(1);
    document.getElementById('slider-' + id).value = rawVal;
  }

  function ajustar(id, delta) {
    const slider = document.getElementById('slider-' + id);
    let val = Math.min(60, Math.max(40, parseInt(slider.value) + delta));
    actualizarValor(id, val);
  }

  function resetVal(id) { actualizarValor(id, 40); }

  function getVal(id) {
    return parseInt(document.getElementById('slider-' + id).value) / 10;
  }

  function enviarAmbos() {
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo, competidorId: turnoActual.competidorA.id,
      precision: getVal('precision-A'), presentacion: getVal('presentacion-A')
    });
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo, competidorId: turnoActual.competidorB.id,
      precision: getVal('precision-B'), presentacion: getVal('presentacion-B')
    });
    mostrarEnviado();
  }

  function enviarUno(fase) {
    let comp;
    if (fase === 'A') comp = turnoActual.competidorA;
    else if (fase === 'B') comp = turnoActual.competidorB;
    else comp = turnoActual.competidor;
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo, competidorId: comp.id,
      precision: getVal('precision-A'), presentacion: getVal('presentacion-A')
    });
    mostrarEnviado();
  }

  function mostrarEnviado() {
    document.getElementById('panel-calificacion').classList.remove('visible');
    document.getElementById('overlay-enviado').classList.remove('hidden');
  }

  // ── SOCKET ──
  socket.on('juez-ok', (data) => {
    salaInfo = data.sala;
    document.getElementById('overlay-login').classList.add('hidden');
    document.getElementById('juez-badge').textContent = 'JUEZ ' + numJuez;
    document.getElementById('overlay-espera').classList.remove('hidden');
  });

  socket.on('error-sala', (data) => { alert(data.msg); });

  socket.on('competencia-iniciada', (data) => {
    salaInfo.tipo = data.tipo;
    salaInfo.modo = data.modo;
    salaInfo.competidores = data.competidores;
  });

  socket.on('turno-actualizado', (data) => {
    renderCalificacion(data.turno);
  });
</script>
</body>
</html>
