<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juez - Poomsae</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; max-width: 480px; margin: 0 auto; }
    h1 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: 1.4rem; }
    .card { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    h2 { color: #e94560; margin-bottom: 15px; font-size: 0.95rem; text-transform: uppercase; }
    input, select { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #444; background: #0f3460; color: #fff; font-size: 1rem; }
    button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-bottom: 8px; font-weight: bold; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-disabled { background: #444; color: #888; cursor: not-allowed; }
    .hidden { display: none; }
    .competidor-card { background: #0f3460; border-radius: 10px; padding: 15px; margin-bottom: 15px; text-align: center; }
    .competidor-nombre { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
    .competidor-sub { font-size: 0.85rem; color: #aaa; }
    .score-group { margin-bottom: 20px; }
    .score-label { font-size: 0.9rem; color: #aaa; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .score-valor { font-size: 1.8rem; font-weight: bold; color: #e94560; text-align: center; margin-bottom: 10px; }
    .score-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .score-btns button { padding: 12px; font-size: 0.9rem; background: #16213e; color: #fff; border: 1px solid #444; border-radius: 6px; margin: 0; width: auto; }
    .score-btns button:active { background: #e94560; }
    .score-slider { width: 100%; margin: 10px 0; accent-color: #e94560; }
    .juez-badge { background: #e94560; color: #fff; border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; display: inline-block; margin-bottom: 10px; }
    .estado-espera { text-align: center; color: #888; padding: 20px; }
    .vs-label { text-align: center; background: #e94560; border-radius: 6px; padding: 5px; margin-bottom: 10px; font-size: 0.85rem; }
    .enviado-ok { background: #27ae60; border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 15px; font-weight: bold; }
  </style>
</head>
<body>

<h1>🥋 Juez Poomsae</h1>

<!-- LOGIN -->
<div id="seccion-login" class="card">
  <h2>Conectarse</h2>
  <input type="text" id="input-sala" placeholder="Código de sala" maxlength="8" style="text-transform:uppercase">
  <input type="text" id="input-nombre" placeholder="Tu nombre (opcional)">
  <select id="input-numjuez">
    <option value="1">Juez 1</option>
    <option value="2">Juez 2</option>
    <option value="3">Juez 3</option>
    <option value="4">Juez 4</option>
    <option value="5">Juez 5</option>
    <option value="6">Juez 6</option>
    <option value="7">Juez 7</option>
  </select>
  <button class="btn-primary" onclick="conectarse()">Conectar</button>
</div>

<!-- PANEL JUEZ -->
<div id="seccion-juez" class="hidden">

  <div style="text-align:center; margin-bottom:15px">
    <span class="juez-badge" id="display-juez-num">Juez 1</span>
    <span style="font-size:0.85rem; color:#888" id="display-sala-info"></span>
  </div>

  <!-- ESPERA -->
  <div id="estado-espera" class="card">
    <div class="estado-espera">⏳ Esperando turno...</div>
  </div>

  <!-- CALIFICACION -->
  <div id="seccion-calificacion" class="hidden">
    <div id="display-competidores"></div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let salaInfo = {};
  let numJuez = 1;
  let turnoActual = null;

  // ── CONECTAR ──
  function conectarse() {
    const codigo = document.getElementById('input-sala').value.trim().toUpperCase();
    const nombre = document.getElementById('input-nombre').value.trim();
    numJuez = parseInt(document.getElementById('input-numjuez').value);
    if (!codigo) return alert('Ingresa el código de sala');
    socket.emit('juez-unirse', { codigo, nombre, numJuez });
  }

  // ── RENDERIZAR FORMULARIO DE CALIFICACIÓN ──
  function renderCalificacion(turno) {
    turnoActual = turno;
    const div = document.getElementById('display-competidores');
    const tipo = salaInfo.tipo;

    if (turno.tipo === '1v1-simultaneo') {
      div.innerHTML = `
        <div class="vs-label">Califica a los dos simultáneamente</div>
        ${formCompetidor(turno.competidorA, tipo, 'A')}
        ${formCompetidor(turno.competidorB, tipo, 'B')}
        <button class="btn-success" onclick="enviarAmbos()">✅ Enviar ambos puntajes</button>
      `;
    } else if (turno.tipo === '1v1-secuencial') {
      const comp = turno.fase === 'A' ? turno.competidorA : turno.competidorB;
      div.innerHTML = `
        <div class="vs-label">${turno.fase === 'A' ? 'Primer competidor' : 'Segundo competidor'}</div>
        ${formCompetidor(comp, tipo, turno.fase)}
        <button class="btn-success" onclick="enviarUno('${turno.fase}')">✅ Enviar puntaje</button>
      `;
    } else {
      // cutoff / freestyle
      div.innerHTML = `
        <div class="competidor-sub" style="text-align:center;margin-bottom:10px">
          ${turno.numero} de ${turno.total}
        </div>
        ${formCompetidor(turno.competidor, tipo, 'C')}
        <button class="btn-success" onclick="enviarUno('C')">✅ Enviar puntaje</button>
      `;
    }

    document.getElementById('estado-espera').classList.add('hidden');
    document.getElementById('seccion-calificacion').classList.remove('hidden');
  }

  function formCompetidor(comp, tipo, key) {
    if (!comp) return '';
    const labels = tipo === 'freestyle'
      ? ['Dificultad', 'Presentación']
      : ['Precisión', 'Presentación'];
    return `
      <div class="competidor-card">
        <div class="competidor-nombre">${comp.nombre}</div>
        <div class="score-group" style="margin-top:15px">
          <div class="score-label">
            <span>${labels[0]}</span>
          </div>
          <div class="score-valor" id="val-precision-${key}">4.0</div>
          <input type="range" class="score-slider" id="slider-precision-${key}"
            min="40" max="60" value="40" step="1"
            oninput="actualizarValor('precision', '${key}', this.value)">
          <div class="score-btns">
            <button onclick="ajustar('precision','${key}',-5)">-0.5</button>
            <button onclick="ajustar('precision','${key}',-1)">-0.1</button>
            <button onclick="ajustar('precision','${key}',+1)">+0.1</button>
            <button onclick="ajustar('precision','${key}',+5)">+0.5</button>
            <button onclick="ajustar('precision','${key}',+10)">+1.0</button>
            <button onclick="resetVal('precision','${key}')">Reset</button>
          </div>
        </div>
        <div class="score-group">
          <div class="score-label">
            <span>${labels[1]}</span>
          </div>
          <div class="score-valor" id="val-presentacion-${key}">4.0</div>
          <input type="range" class="score-slider" id="slider-presentacion-${key}"
            min="40" max="60" value="40" step="1"
            oninput="actualizarValor('presentacion', '${key}', this.value)">
          <div class="score-btns">
            <button onclick="ajustar('presentacion','${key}',-5)">-0.5</button>
            <button onclick="ajustar('presentacion','${key}',-1)">-0.1</button>
            <button onclick="ajustar('presentacion','${key}',+1)">+0.1</button>
            <button onclick="ajustar('presentacion','${key}',+5)">+0.5</button>
            <button onclick="ajustar('presentacion','${key}',+10)">+1.0</button>
            <button onclick="resetVal('presentacion','${key}')">Reset</button>
          </div>
        </div>
      </div>
    `;
  }

  // ── CONTROLES DE PUNTAJE ──
  function actualizarValor(campo, key, rawVal) {
    const val = parseInt(rawVal) / 10;
    document.getElementById(`val-${campo}-${key}`).textContent = val.toFixed(1);
    document.getElementById(`slider-${campo}-${key}`).value = rawVal;
  }

  function ajustar(campo, key, delta) {
    const slider = document.getElementById(`slider-${campo}-${key}`);
    let val = parseInt(slider.value) + delta;
    val = Math.min(60, Math.max(40, val));
    slider.value = val;
    actualizarValor(campo, key, val);
  }

  function resetVal(campo, key) {
    actualizarValor(campo, key, 40);
  }

  function getValores(key) {
    const p = parseInt(document.getElementById(`slider-precision-${key}`).value) / 10;
    const pr = parseInt(document.getElementById(`slider-presentacion-${key}`).value) / 10;
    return { precision: p, presentacion: pr };
  }

  // ── ENVIAR PUNTAJES ──
  function enviarAmbos() {
    const a = getValores('A');
    const b = getValores('B');
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo,
      competidorId: turnoActual.competidorA.id,
      precision: a.precision,
      presentacion: a.presentacion
    });
    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo,
      competidorId: turnoActual.competidorB.id,
      precision: b.precision,
      presentacion: b.presentacion
    });
    mostrarEnviado();
  }

  function enviarUno(fase) {
    let comp, vals;
    if (fase === 'A') { comp = turnoActual.competidorA; vals = getValores('A'); }
    else if (fase === 'B') { comp = turnoActual.competidorB; vals = getValores('B'); }
    else { comp = turnoActual.competidor; vals = getValores('C'); }

    socket.emit('juez-puntaje', {
      codigo: salaInfo.codigo,
      competidorId: comp.id,
      precision: vals.precision,
      presentacion: vals.presentacion
    });
    mostrarEnviado();
  }

  function mostrarEnviado() {
    document.getElementById('seccion-calificacion').classList.add('hidden');
    document.getElementById('estado-espera').innerHTML = `
      <div class="enviado-ok">✅ Puntaje enviado</div>
      <div class="estado-espera">Esperando siguiente turno...</div>
    `;
    document.getElementById('estado-espera').classList.remove('hidden');
  }

  // ── SOCKET EVENTOS ──
  socket.on('juez-ok', (data) => {
    salaInfo = data.sala;
    document.getElementById('seccion-login').classList.add('hidden');
    document.getElementById('seccion-juez').classList.remove('hidden');
    document.getElementById('display-juez-num').textContent = `Juez ${numJuez}`;
    document.getElementById('display-sala-info').textContent =
      ` · ${salaInfo.codigo} · ${salaInfo.tipo}`;
  });

  socket.on('error-sala', (data) => {
    alert(data.msg);
  });

  socket.on('turno-actualizado', (data) => {
    renderCalificacion(data.turno);
  });

  socket.on('competencia-iniciada', (data) => {
    salaInfo.tipo = data.tipo;
    salaInfo.modo = data.modo;
    salaInfo.competidores = data.competidores;
  });

</script>
</body>
</html>
