<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mesa Central - Poomsae</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d; color: white;
      font-family: 'Inter', sans-serif;
      min-height: 100vh; padding: 12px;
      user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid #1a1a1a;
    }
    .header-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 4px; color: #c9a84c;
    }
    .header-badge {
      background: #1a1a1a; border: 1px solid #333; color: #888;
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
    }
    .panel {
      background: #141414; border: 1px solid #222;
      border-radius: 12px; padding: 14px; margin-bottom: 12px;
    }
    .panel-titulo {
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      color: #555; text-transform: uppercase; margin-bottom: 12px;
    }
    .input-field {
      width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #fff; padding: 11px 12px;
      font-size: 15px; font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px; outline: none; margin-bottom: 8px;
    }
    .input-field:focus { border-color: #c9a84c; }
    select.input-field { cursor: pointer; }
    .input-label {
      font-size: 8px; font-weight: 700; letter-spacing: 3px;
      color: #555; text-transform: uppercase; margin-bottom: 5px; display: block;
    }
    .btn-gold {
      width: 100%; background: #c9a84c; color: #000; border: none;
      padding: 13px; font-family: 'Bebas Neue', sans-serif;
      font-size: 17px; letter-spacing: 3px; border-radius: 8px; cursor: pointer;
    }
    .btn-gold:active { filter: brightness(0.85); }
    .btn-dark {
      width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #888; padding: 11px; font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; letter-spacing: 2px; border-radius: 8px; cursor: pointer;
      margin-bottom: 6px;
    }
    .btn-dark:active { border-color: #c9a84c; color: #c9a84c; }
    .btn-green {
      width: 100%; background: #16a34a; color: #fff; border: none;
      padding: 14px; font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 3px; border-radius: 10px; cursor: pointer;
    }
    .btn-green:active { filter: brightness(0.85); }
    .btn-red {
      width: 100%; background: #dc2626; color: #fff; border: none;
      padding: 14px; font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 3px; border-radius: 10px; cursor: pointer;
    }
    .btn-red:active { filter: brightness(0.85); }
    .hidden { display: none; }

    /* SALA INFO */
    .sala-codigo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px; letter-spacing: 8px; color: #c9a84c;
      text-align: center; line-height: 1;
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }
    .sala-sub {
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      color: #555; text-transform: uppercase; text-align: center; margin-top: 4px;
    }

    /* JUECES */
    .jueces-grid {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .juez-chip {
      display: flex; align-items: center; gap: 6px;
      background: #0a0a0a; border: 1px solid #1a1a1a;
      border-radius: 20px; padding: 5px 12px;
    }
    .juez-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; }
    .juez-dot.activo { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .juez-txt {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      color: #444; text-transform: uppercase;
    }
    .juez-chip.activo .juez-txt { color: #22c55e; }

    /* COMPETIDORES */
    .comp-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #0a0a0a; border: 1px solid #1a1a1a;
      border-radius: 8px; padding: 10px 12px; margin-bottom: 6px;
    }
    .comp-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px; color: #555; width: 24px;
    }
    .comp-nombre {
      font-size: 13px; font-weight: 700; letter-spacing: 1px; flex: 1;
    }
    .btn-del {
      background: none; border: none; color: #444;
      font-size: 16px; cursor: pointer; padding: 4px 8px;
    }
    .btn-del:active { color: #dc2626; }

    /* TURNO PANEL */
    .turno-card {
      background: #0a0a0a; border: 1px solid #c9a84c;
      border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 12px;
    }
    .turno-label {
      font-size: 8px; font-weight: 700; letter-spacing: 3px;
      color: #555; text-transform: uppercase; margin-bottom: 8px;
    }
    .turno-nombre {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; letter-spacing: 3px; color: #fff;
    }
    .turno-sub { font-size: 10px; color: #555; margin-top: 4px; }
    .vs-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-top: 6px;
    }
    .vs-sep {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; color: #333; letter-spacing: 2px;
    }

    /* PUNTAJES RECIBIDOS */
    .puntajes-bar {
      display: flex; gap: 6px; justify-content: center; margin-bottom: 12px;
    }
    .pj-chip {
      width: 36px; height: 36px; border-radius: 50%;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #444;
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
    }
    .pj-chip.recibido { background: #16a34a; border-color: #22c55e; color: #fff; }

    /* RANKING */
    .rank-item {
      display: flex; align-items: center; gap: 10px;
      background: #0a0a0a; border: 1px solid #1a1a1a;
      border-radius: 8px; padding: 10px 12px; margin-bottom: 6px;
      transition: all 0.3s;
    }
    .rank-pos {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; color: #c9a84c; width: 28px;
    }
    .rank-nombre { flex: 1; font-size: 13px; font-weight: 700; }
    .rank-total {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; color: #c9a84c;
    }
    .rank-item.pasa { border-left: 3px solid #22c55e; }
    .rank-item.fuera { border-left: 3px solid #dc2626; opacity: 0.5; }
    .linea-corte {
      border: none; border-top: 1px dashed #c9a84c;
      margin: 8px 0;
    }
    .corte-label {
      text-align: center; font-size: 8px; font-weight: 700;
      letter-spacing: 3px; color: #c9a84c; text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* LOG */
    #log {
      font-size: 9px; color: #444; margin-top: 10px;
      max-height: 60px; overflow-y: auto; letter-spacing: 1px;
    }

    /* INPUT ADD */
    .add-row { display: flex; gap: 8px; }
    .add-row .input-field { margin-bottom: 0; flex: 1; }
    .btn-add {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #c9a84c; padding: 11px 16px; border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif; font-size: 18px;
      cursor: pointer; flex-shrink: 0;
    }
    .btn-add:active { background: #c9a84c; color: #000; }

    .corte-row { display: flex; gap: 8px; margin-top: 10px; }
    .corte-row .input-field { margin-bottom: 0; flex: 1; width: auto; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">POOMSAE</div>
  <div class="header-badge" id="header-badge">Mesa Central</div>
</div>

<!-- SETUP -->
<div id="seccion-setup">
  <div class="panel">
    <div class="panel-titulo">Crear Sala</div>
    <label class="input-label">Código de Sala</label>
    <input class="input-field" id="input-codigo" type="text" maxlength="8" placeholder="FINAL1" style="text-transform:uppercase">
    <label class="input-label">Tipo</label>
    <select class="input-field" id="input-tipo">
      <option value="traditional">Traditional</option>
      <option value="freestyle">Freestyle</option>
    </select>
    <label class="input-label">Modo de Competencia</label>
    <select class="input-field" id="input-modo">
      <option value="1v1-simultaneo">1v1 Simultáneo</option>
      <option value="1v1-secuencial">1v1 Secuencial</option>
      <option value="cutoff">Cut Off / Todos contra todos</option>
    </select>
    <label class="input-label">Número de Jueces</label>
    <select class="input-field" id="input-jueces">
      <option value="3">3 Jueces</option>
      <option value="5">5 Jueces</option>
      <option value="7">7 Jueces</option>
    </select>
    <button class="btn-gold" onclick="crearSala()">CREAR SALA</button>
  </div>
</div>

<!-- SALA ACTIVA -->
<div id="seccion-sala" class="hidden">

  <!-- CÓDIGO + JUECES -->
  <div class="panel">
    <div class="sala-codigo" id="display-codigo">—</div>
    <div class="sala-sub" id="display-modo">—</div>
    <div class="jueces-grid" id="display-jueces"></div>
    <div id="log"></div>
  </div>

  <!-- COMPETIDORES -->
  <div class="panel" id="panel-competidores">
    <div class="panel-titulo">Competidores</div>
    <div class="add-row" style="margin-bottom:10px">
      <input class="input-field" id="input-competidor" type="text" placeholder="NOMBRE" style="text-transform:uppercase">
      <button class="btn-add" onclick="agregarCompetidor()">+</button>
    </div>
    <div id="lista-competidores"></div>
    <button class="btn-green" id="btn-iniciar" onclick="iniciarCompetencia()" style="margin-top:4px">
      INICIAR COMPETENCIA
    </button>
  </div>

  <!-- CONTROL TURNO -->
  <div class="panel hidden" id="panel-control">
    <div class="panel-titulo">Turno Actual</div>
    <div id="display-turno"></div>

    <!-- PUNTAJES RECIBIDOS -->
    <div class="puntajes-bar" id="puntajes-bar"></div>

    <button class="btn-gold" id="btn-revelar" onclick="revelarPuntaje()">
      REVELAR PUNTAJE
    </button>
    <button class="btn-dark hidden" id="btn-siguiente" onclick="siguienteTurno()" style="margin-top:6px">
      SIGUIENTE →
    </button>
  </div>

  <!-- RANKING (cutoff / freestyle) -->
  <div class="panel hidden" id="panel-ranking">
    <div class="panel-titulo">Ranking en Vivo</div>
    <div id="display-ranking"></div>
    <div class="corte-row">
      <input class="input-field" id="input-topN" type="number" placeholder="Top N pasan" min="1">
      <button class="btn-gold" style="width:auto; padding:11px 16px; white-space:nowrap" onclick="definirCorte()">
        CORTE
      </button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let salaActual = null;
  let competidores = [];
  let turnoIndex = 0;
  let modo = '';
  let tipo = '';
  let numJueces = 3;
  let puntajesRecibidos = {};

  // ── CREAR SALA ──
  function crearSala() {
    const codigo = document.getElementById('input-codigo').value.trim().toUpperCase();
    tipo = document.getElementById('input-tipo').value;
    modo = document.getElementById('input-modo').value;
    numJueces = parseInt(document.getElementById('input-jueces').value);
    if (!codigo) return alert('Ingresa un código de sala');
    salaActual = codigo;
    socket.emit('mesa-crear-sala', { codigo, tipo, modo, numJueces });
  }

  // ── COMPETIDORES ──
  function agregarCompetidor() {
    const nombre = document.getElementById('input-competidor').value.trim().toUpperCase();
    if (!nombre) return;
    competidores.push({ nombre, puntajes: [], total: null });
    document.getElementById('input-competidor').value = '';
    renderCompetidores();
  }

  function renderCompetidores() {
    document.getElementById('lista-competidores').innerHTML =
      competidores.map((c, i) => `
        <div class="comp-item">
          <span class="comp-num">${i + 1}</span>
          <span class="comp-nombre">${c.nombre}</span>
          <button class="btn-del" onclick="eliminarCompetidor(${i})">✕</button>
        </div>
      `).join('');
  }

  function eliminarCompetidor(i) {
    competidores.splice(i, 1);
    renderCompetidores();
  }

  // ── INICIAR ──
  function iniciarCompetencia() {
    if (competidores.length < 2) return alert('Agrega al menos 2 competidores');
    turnoIndex = 0;
    socket.emit('mesa-iniciar', { codigo: salaActual, competidores, modo, tipo });
    document.getElementById('panel-competidores').classList.add('hidden');
    document.getElementById('panel-control').classList.remove('hidden');
    if (modo === 'cutoff' || tipo === 'freestyle') {
      document.getElementById('panel-ranking').classList.remove('hidden');
    }
    mostrarTurnoActual();
  }

  // ── TURNO ──
  function mostrarTurnoActual() {
    puntajesRecibidos = {};
    renderPuntajesBar({});
    const div = document.getElementById('display-turno');

    if (modo === '1v1-simultaneo' || modo === '1v1-secuencial') {
      const a = competidores[turnoIndex];
      const b = competidores[turnoIndex + 1];
      if (!a || !b) { finCompetencia(); return; }
      div.innerHTML = `
        <div class="turno-card">
          <div class="turno-label">${modo === '1v1-simultaneo' ? 'Simultáneo' : 'Secuencial'}</div>
          <div class="vs-row">
            <span class="turno-nombre">${a.nombre}</span>
            <span class="vs-sep">VS</span>
            <span class="turno-nombre">${b.nombre}</span>
          </div>
        </div>`;
    } else {
      const c = competidores[turnoIndex];
      if (!c) { finCompetencia(); return; }
      div.innerHTML = `
        <div class="turno-card">
          <div class="turno-label">${turnoIndex + 1} de ${competidores.length}</div>
          <div class="turno-nombre">${c.nombre}</div>
        </div>`;
    }

    document.getElementById('btn-revelar').classList.remove('hidden');
    document.getElementById('btn-siguiente').classList.add('hidden');
    socket.emit('mesa-turno', { codigo: salaActual, turnoIndex, modo });
  }

  function finCompetencia() {
    document.getElementById('display-turno').innerHTML = `
      <div class="turno-card" style="border-color:#22c55e">
        <div class="turno-nombre" style="color:#22c55e; font-size:24px">COMPETENCIA FINALIZADA</div>
      </div>`;
    document.getElementById('btn-revelar').classList.add('hidden');
    document.getElementById('btn-siguiente').classList.add('hidden');
  }

  function revelarPuntaje() {
    socket.emit('mesa-revelar', { codigo: salaActual, turnoIndex });
    document.getElementById('btn-revelar').classList.add('hidden');
    document.getElementById('btn-siguiente').classList.remove('hidden');
  }

  function siguienteTurno() {
    turnoIndex += (modo === '1v1-simultaneo' || modo === '1v1-secuencial') ? 2 : 1;
    mostrarTurnoActual();
  }

  function definirCorte() {
    const topN = parseInt(document.getElementById('input-topN').value);
    if (!topN) return alert('Ingresa cuántos pasan');
    socket.emit('mesa-corte', { codigo: salaActual, topN });
  }

  // ── RENDER HELPERS ──
  function renderJueces(jueces) {
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      const conectado = jueces.find(j => j.num === i);
      html += `
        <div class="juez-chip ${conectado ? 'activo' : ''}">
          <div class="juez-dot ${conectado ? 'activo' : ''}"></div>
          <span class="juez-txt">J${i}${conectado && conectado.nombre ? ' · ' + conectado.nombre : ''}</span>
        </div>`;
    }
    document.getElementById('display-jueces').innerHTML = html;
  }

  function renderPuntajesBar(recibidos) {
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      const listo = recibidos[i] > 0;
      html += `<div class="pj-chip ${listo ? 'recibido' : ''}">J${i}</div>`;
    }
    document.getElementById('puntajes-bar').innerHTML = html;
  }

  function renderRanking(ranking, topN) {
    const div = document.getElementById('display-ranking');
    let html = '';
    ranking.forEach((c, i) => {
      let clase = '';
      if (topN) clase = i < topN ? 'pasa' : 'fuera';
      if (topN && i === topN) html += `<div class="linea-corte"></div><div class="corte-label">— CORTE —</div>`;
      html += `
        <div class="rank-item ${clase}">
          <span class="rank-pos">${i + 1}</span>
          <span class="rank-nombre">${c.nombre}</span>
          <span class="rank-total">${c.total !== null ? c.total.toFixed(2) : '—'}</span>
        </div>`;
    });
    div.innerHTML = html;
  }

  function log(msg) {
    const div = document.getElementById('log');
    div.innerHTML += `<div>${new Date().toLocaleTimeString()} — ${msg}</div>`;
    div.scrollTop = div.scrollHeight;
  }

  // ── SOCKET ──
  socket.on('sala-creada', (data) => {
    document.getElementById('seccion-setup').classList.add('hidden');
    document.getElementById('seccion-sala').classList.remove('hidden');
    document.getElementById('display-codigo').textContent = data.codigo;
    document.getElementById('display-modo').textContent =
      `${data.tipo.toUpperCase()} · ${data.modo} · ${data.numJueces} JUECES`;
    document.getElementById('header-badge').textContent = data.codigo;
    renderJueces([]);
    log('Sala creada');
  });

  socket.on('juez-conectado', (data) => {
    renderJueces(data.jueces);
    log('Juez conectado: ' + (data.nombre || ''));
  });

  socket.on('juez-desconectado', (data) => {
    renderJueces(data.jueces);
    log('Juez desconectado');
  });

  socket.on('puntaje-recibido', (data) => {
    if (!puntajesRecibidos[data.juezNum]) puntajesRecibidos[data.juezNum] = 0;
    puntajesRecibidos[data.juezNum]++;
    renderPuntajesBar(puntajesRecibidos);
    log(`Puntaje recibido · Juez ${data.juezNum} (${data.totalPuntajes}/${data.numJueces})`);
  });

  socket.on('ranking-actualizado', (data) => {
    renderRanking(data.ranking, null);
  });

  socket.on('corte-aplicado', (data) => {
    renderRanking(data.ranking, data.topN);
  });
</script>
</body>
</html>
