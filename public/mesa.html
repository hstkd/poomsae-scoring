<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mesa Central - Poomsae</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: white; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 12px; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #1a1a1a; }
    .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: #c9a84c; }
    .header-badge { background: #1a1a1a; border: 1px solid #333; color: #888; font-size: 9px; font-weight: 700; letter-spacing: 2px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
    .panel { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .panel-titulo { font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 12px; }
    .input-field { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; padding: 11px 12px; font-size: 15px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; outline: none; margin-bottom: 8px; }
    .input-field:focus { border-color: #c9a84c; }
    select.input-field { cursor: pointer; }
    .input-label { font-size: 8px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 5px; display: block; }
    .btn-gold { width: 100%; background: #c9a84c; color: #000; border: none; padding: 13px; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 3px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
    .btn-gold:active { filter: brightness(0.85); }
    .btn-dark { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #888; padding: 11px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
    .btn-dark:active { border-color: #c9a84c; color: #c9a84c; }
    .btn-green { width: 100%; background: #16a34a; color: #fff; border: none; padding: 13px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
    .btn-green:active { filter: brightness(0.85); }
    .btn-blue { width: 100%; background: #0ea5e9; color: #fff; border: none; padding: 13px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
    .btn-blue:active { filter: brightness(0.85); }
    .btn-red { width: 100%; background: #dc2626; color: #fff; border: none; padding: 13px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
    .btn-red:active { filter: brightness(0.85); }
    .hidden { display: none; }
    .sala-codigo { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 6px; color: #c9a84c; text-align: center; line-height: 1; }
    .sala-sub { font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; text-align: center; margin-top: 4px; }
    .sala-categoria { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 4px; color: #fff; text-align: center; margin-top: 8px; line-height: 1; }
    .sala-ronda { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 3px; color: #c9a84c; text-align: center; margin-top: 2px; }
    .jueces-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .juez-chip { display: flex; align-items: center; gap: 6px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 5px 12px; }
    .juez-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; }
    .juez-dot.activo { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .juez-txt { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: #444; text-transform: uppercase; }
    .juez-chip.activo .juez-txt { color: #22c55e; }
    .comp-item { display: flex; align-items: center; justify-content: space-between; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .comp-num { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #555; width: 24px; }
    .comp-nombre { font-size: 13px; font-weight: 700; letter-spacing: 1px; flex: 1; }
    .btn-del { background: none; border: none; color: #444; font-size: 16px; cursor: pointer; padding: 4px 8px; }
    .btn-del:active { color: #dc2626; }
    .cronometro-card { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 10px; }
    .cronometro-label { font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 6px; }
    .cronometro-display { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 4px; color: #c9a84c; line-height: 1; text-shadow: 0 0 20px rgba(201,168,76,0.4); }
    .cronometro-display.rojo { color: #dc2626; text-shadow: 0 0 20px rgba(220,38,38,0.4); }
    .crono-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .poomsae-card { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px; margin-bottom: 10px; text-align: center; }
    .poomsae-label { font-size: 8px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 8px; }
    .poomsae-nombre { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: #c9a84c; }
    .poomsae-nombre.vacio { color: #333; font-size: 16px; letter-spacing: 2px; }
    .turno-card { background: #0a0a0a; border: 1px solid #c9a84c; border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 12px; }
    .turno-label { font-size: 8px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 8px; }
    .turno-nombre { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: #fff; }
    .vs-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 6px; }
    .vs-sep { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #333; }
    .puntajes-bar { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
    .pj-chip { min-width: 42px; padding: 0 8px; height: 42px; border-radius: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #444; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
    .pj-chip.recibido { background: #16a34a; border-color: #22c55e; color: #fff; }
    .rank-item { display: flex; align-items: center; gap: 10px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .rank-pos { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #c9a84c; width: 28px; }
    .rank-nombre { flex: 1; font-size: 13px; font-weight: 700; }
    .rank-total { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #c9a84c; }
    .fase-badge { display: inline-block; padding: 5px 16px; border-radius: 20px; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; margin-bottom: 10px; }
    .fase-badge.ejecucion { background: #16a34a; color: #fff; }
    .fase-badge.sorteo { background: #c9a84c; color: #000; }
    .fase-badge.calificacion { background: #7c3aed; color: #fff; }
    .notas-juez { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .notas-juez-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .notas-juez-num { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; color: #c9a84c; }
    .notas-juez-total { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #fff; }
    .notas-juez-detalle { font-size: 9px; color: #555; letter-spacing: 1px; }
    #log { font-size: 9px; color: #444; margin-top: 10px; max-height: 60px; overflow-y: auto; }
    .add-row { display: flex; gap: 8px; }
    .add-row .input-field { margin-bottom: 0; flex: 1; }
    .btn-add { background: #1a1a1a; border: 1px solid #2a2a2a; color: #c9a84c; padding: 11px 16px; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .btn-add:active { background: #c9a84c; color: #000; }
    .corte-row { display: flex; gap: 8px; margin-top: 10px; }
    .corte-row .input-field { margin-bottom: 0; flex: 1; width: auto; }
    .resultado-final { background: #0a0a0a; border: 2px solid #c9a84c; border-radius: 12px; padding: 16px; text-align: center; margin-top: 12px; }
    .resultado-ganador { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 4px; color: #c9a84c; }
    .resultado-detalle { font-size: 11px; color: #555; letter-spacing: 2px; margin-top: 4px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">POOMSAE</div>
  <div class="header-badge" id="header-badge">Mesa Central</div>
</div>

<!-- SETUP -->
<div id="seccion-setup">
  <div class="panel">
    <div class="panel-titulo">Crear Sala</div>
    <label class="input-label">Código de Sala</label>
    <input class="input-field" id="input-codigo" type="text" maxlength="8" placeholder="FINAL1" style="text-transform:uppercase">
    <label class="input-label">Categoría</label>
    <input class="input-field" id="input-categoria" type="text" placeholder="ej: CADETE MASCULINO" style="text-transform:uppercase;font-size:13px;letter-spacing:1px">
    <label class="input-label">Ronda</label>
    <select class="input-field" id="input-ronda">
      <option value="ELIMINATORIA">Eliminatoria</option>
      <option value="OCTAVOS DE FINAL">Octavos de Final</option>
      <option value="CUARTOS DE FINAL">Cuartos de Final</option>
      <option value="SEMIFINAL">Semifinal</option>
      <option value="FINAL">Final</option>
    </select>
    <label class="input-label">Grupo de Categoría (para sorteo)</label>
    <select class="input-field" id="input-grupo">
      <option value="cadetes">Cadetes (Taegeuk 4 → Taebaek)</option>
      <option value="junior">Junior (Taegeuk 5 → Pyongwon)</option>
      <option value="under30">Under 30 (Taegeuk 7 → Jitae)</option>
      <option value="under40">Under 40 (Taegeuk 7 → Jitae)</option>
    </select>
    <label class="input-label">Tipo</label>
    <select class="input-field" id="input-tipo">
      <option value="traditional">Traditional</option>
      <option value="freestyle">Freestyle</option>
    </select>
    <label class="input-label">Modo de Competencia</label>
    <select class="input-field" id="input-modo">
      <option value="1v1-simultaneo">1v1 Simultáneo</option>
      <option value="1v1-secuencial">1v1 Secuencial</option>
      <option value="cutoff">Cut Off / Todos contra todos</option>
    </select>
    <label class="input-label">Número de Jueces</label>
    <select class="input-field" id="input-jueces">
      <option value="3">3 Jueces</option>
      <option value="5">5 Jueces</option>
      <option value="7">7 Jueces</option>
    </select>
    <button class="btn-gold" onclick="crearSala()">CREAR SALA</button>
  </div>
</div>

<!-- SALA ACTIVA -->
<div id="seccion-sala" class="hidden">

  <div class="panel">
    <div class="sala-codigo" id="display-codigo">—</div>
    <div class="sala-sub" id="display-modo">—</div>
    <div class="sala-categoria" id="display-categoria">—</div>
    <div class="sala-ronda" id="display-ronda">—</div>
    <div class="jueces-grid" id="display-jueces"></div>
    <div id="log"></div>
    <button class="btn-dark" onclick="restaurarSistema()" style="margin-top:10px;color:#dc2626;border-color:#3a0000;font-size:11px;padding:8px">
      ↺ RESTAURAR SISTEMA
    </button>
  </div>

  <!-- COMPETIDORES -->
  <div class="panel" id="panel-competidores">
    <div class="panel-titulo">Competidores</div>
    <div class="add-row" style="margin-bottom:10px">
      <input class="input-field" id="input-competidor" type="text" placeholder="NOMBRE" style="text-transform:uppercase">
      <button class="btn-add" onclick="agregarCompetidor()">+</button>
    </div>
    <div id="lista-competidores"></div>
    <button class="btn-green" onclick="iniciarCompetencia()" style="margin-top:4px">INICIAR COMPETENCIA</button>
  </div>

  <!-- CONTROL 1V1 SIMULTÁNEO -->
  <div class="panel hidden" id="panel-control-simultaneo">

    <div class="panel-titulo">Enfrentamiento</div>
    <div id="display-turno-sim"></div>

    <div style="text-align:center;margin-bottom:10px">
      <span class="fase-badge sorteo" id="fase-badge">Sortear Poomsaes</span>
    </div>

    <!-- SORTEO -->
    <div id="bloque-sorteo-1">
      <div class="poomsae-card">
        <div class="poomsae-label">1ra Poomsae</div>
        <div class="poomsae-nombre vacio" id="display-p1">— Sin sortear —</div>
      </div>
      <div class="poomsae-card" style="margin-top:8px">
        <div class="poomsae-label">2da Poomsae</div>
        <div class="poomsae-nombre vacio" id="display-p2">— Sin sortear —</div>
      </div>
      <button class="btn-blue" onclick="sortear()">🎲 SORTEAR AMBAS POOMSAES</button>
    </div>
    <div id="bloque-sorteo-2" class="hidden"></div>

    <!-- CRONÓMETRO -->
    <div class="cronometro-card hidden" id="bloque-crono">
      <div class="cronometro-label" id="crono-label">—</div>
      <div class="cronometro-display" id="crono-display">—</div>
      <div class="crono-btns">
        <button class="btn-green" onclick="iniciarCrono()">▶ INICIAR</button>
        <button class="btn-red" onclick="detenerCrono()">⏹ DETENER</button>
      </div>
      <button class="btn-dark" onclick="restablecerCrono()" style="margin-top:6px">↺ RESTABLECER TIEMPO</button>
    </div>

    <!-- NOTAS RECIBIDAS -->
    <div id="bloque-notas" class="hidden" style="margin-top:8px">
      <div class="panel-titulo">Notas Recibidas</div>
      <div class="puntajes-bar" id="puntajes-bar"></div>
      <div id="detalle-notas"></div>
    </div>

    <!-- RESULTADO FINAL -->
    <div id="bloque-resultado" class="hidden"></div>

    <!-- SIGUIENTE -->
    <button class="btn-gold hidden" id="btn-siguiente-enfrentamiento" onclick="siguienteEnfrentamiento()" style="margin-top:8px">
      SIGUIENTE ENFRENTAMIENTO →
    </button>

  </div>

  <!-- CONTROL GENERAL -->
  <div class="panel hidden" id="panel-control">
    <div class="panel-titulo">Turno Actual</div>
    <div id="display-turno"></div>
    <div class="puntajes-bar" id="puntajes-bar-gen"></div>
    <button class="btn-gold" id="btn-revelar-gen" onclick="revelarPuntajeGen()">REVELAR PUNTAJE</button>
    <button class="btn-dark hidden" id="btn-siguiente-gen" onclick="siguienteTurno()" style="margin-top:6px">SIGUIENTE →</button>
  </div>

  <!-- RANKING -->
  <div class="panel hidden" id="panel-ranking">
    <div class="panel-titulo">Ranking en Vivo</div>
    <div id="display-ranking"></div>
    <div class="corte-row">
      <input class="input-field" id="input-topN" type="number" placeholder="Top N pasan" min="1">
      <button class="btn-gold" style="width:auto;padding:11px 16px;white-space:nowrap" onclick="definirCorte()">CORTE</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io({ reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });

  let salaActual = null;
  let competidores = [];
  let turnoIndex = 0;
  let modo = '';
  let tipo = '';
  let numJueces = 3;
  let grupoCategoria = 'cadetes';
  let puntajesRecibidos = {};
  let notasDetalle = {}; // { juezNum: { precision, vel, rit, exp, total } }

  const POOMSAES_GRUPO = {
    cadetes: ['Taegeuk 4','Taegeuk 5','Taegeuk 6','Taegeuk 7','Taegeuk 8','Koryo','Keumgang','Taebaek'],
    junior:  ['Taegeuk 5','Taegeuk 6','Taegeuk 7','Taegeuk 8','Koryo','Keumgang','Taebaek','Pyongwon'],
    under30: ['Taegeuk 7','Taegeuk 8','Koryo','Keumgang','Taebaek','Pyongwon','Sipjin','Jitae'],
    under40: ['Taegeuk 7','Taegeuk 8','Koryo','Keumgang','Taebaek','Pyongwon','Sipjin','Jitae']
  };

  let poomsae1 = null;
  let poomsae2 = null;
  let cronoInterval = null;
  let cronoSegundos = 90;
  let cronoOriginal = 90;
  let cronoTipoActual = 'ejecucion';
  let faseActual = 'sorteo1';

  // Notas acumuladas por competidor para calcular resultado
  let notasPoomsae1 = {}; // { compId: total }
  let notasPoomsae2 = {}; // { compId: total }

  // ── CREAR SALA ──
  function crearSala() {
    const codigo = document.getElementById('input-codigo').value.trim().toUpperCase();
    const categoria = document.getElementById('input-categoria').value.trim().toUpperCase();
    const ronda = document.getElementById('input-ronda').value;
    grupoCategoria = document.getElementById('input-grupo').value;
    tipo = document.getElementById('input-tipo').value;
    modo = document.getElementById('input-modo').value;
    numJueces = parseInt(document.getElementById('input-jueces').value);
    if (!codigo) return alert('Ingresa un código de sala');
    if (!categoria) return alert('Ingresa la categoría');
    salaActual = codigo;
    socket.emit('mesa-crear-sala', { codigo, tipo, modo, numJueces, categoria, ronda, grupoCategoria });
  }

  // ── COMPETIDORES ──
  function agregarCompetidor() {
    const nombre = document.getElementById('input-competidor').value.trim().toUpperCase();
    if (!nombre) return;
    competidores.push({ nombre, puntajes: [], total: null });
    document.getElementById('input-competidor').value = '';
    renderCompetidores();
  }
  function renderCompetidores() {
    document.getElementById('lista-competidores').innerHTML =
      competidores.map((c,i) => `
        <div class="comp-item">
          <span class="comp-num">${i+1}</span>
          <span class="comp-nombre">${c.nombre}</span>
          <button class="btn-del" onclick="eliminarCompetidor(${i})">✕</button>
        </div>`).join('');
  }
  function eliminarCompetidor(i) { competidores.splice(i,1); renderCompetidores(); }

  // ── INICIAR ──
  function iniciarCompetencia() {
    if (competidores.length < 2) return alert('Agrega al menos 2 competidores');
    turnoIndex = 0;
    socket.emit('mesa-iniciar', { codigo: salaActual, competidores, modo, tipo });
    document.getElementById('panel-competidores').classList.add('hidden');
    if (modo === '1v1-simultaneo') {
      document.getElementById('panel-control-simultaneo').classList.remove('hidden');
      faseActual = 'sorteo1';
      poomsae1 = null; poomsae2 = null;
      notasPoomsae1 = {}; notasPoomsae2 = {};
      mostrarTurnoSimultaneo();
      actualizarFaseUI();
    } else {
      document.getElementById('panel-control').classList.remove('hidden');
      if (modo === 'cutoff' || tipo === 'freestyle') document.getElementById('panel-ranking').classList.remove('hidden');
      mostrarTurnoActual();
    }
  }

  // ── SORTEO ──
  function sortear() {
    const lista = POOMSAES_GRUPO[grupoCategoria] || [];
    if (!lista.length) return alert('No hay poomsaes disponibles');
    const idx1 = Math.floor(Math.random() * lista.length);
    poomsae1 = lista[idx1];
    const restantes = lista.filter(p => p !== poomsae1);
    poomsae2 = restantes[Math.floor(Math.random() * restantes.length)];

    socket.emit('mesa-sortear-poomsae', { codigo: salaActual, numero: 1, poomsae: poomsae1 });
    socket.emit('mesa-sortear-poomsae', { codigo: salaActual, numero: 2, poomsae: poomsae2 });

    const el1 = document.getElementById('display-p1');
    const el2 = document.getElementById('display-p2');
    if (el1) { el1.textContent = poomsae1; el1.classList.remove('vacio'); }
    if (el2) { el2.textContent = poomsae2; el2.classList.remove('vacio'); }

    faseActual = 'ejecucion1';
    notasDetalle = {};
    puntajesRecibidos = {};
    mostrarTurnoSimultaneo();
    actualizarFaseUI();
    log(`Sorteadas: ${poomsae1} / ${poomsae2}`);
  }

  // ── CRONÓMETRO ──
  function setCrono(segundos, tipoC, label) {
    detenerCrono();
    cronoSegundos = segundos;
    cronoOriginal = segundos;
    cronoTipoActual = tipoC;
    document.getElementById('crono-label').textContent = label;
    actualizarDisplayCrono();
  }

  function iniciarCrono() {
    if (cronoInterval) return;
    // Notificar a jueces que pueden calificar
    socket.emit('mesa-fase', { codigo: salaActual, fase: faseActual });
    socket.emit('mesa-cronometro', { codigo: salaActual, accion: 'iniciar', duracion: cronoSegundos, tipo: cronoTipoActual });
    cronoInterval = setInterval(() => {
      cronoSegundos--;
      actualizarDisplayCrono();
      socket.emit('mesa-cronometro', { codigo: salaActual, accion: 'tick', duracion: cronoSegundos, tipo: cronoTipoActual });
      if (cronoSegundos <= 0) {
        detenerCrono();
        socket.emit('mesa-cronometro', { codigo: salaActual, accion: 'fin', duracion: 0, tipo: cronoTipoActual });
      }
    }, 1000);
  }

  function detenerCrono() {
    if (cronoInterval) { clearInterval(cronoInterval); cronoInterval = null; }
    socket.emit('mesa-cronometro', { codigo: salaActual, accion: 'detener', duracion: cronoSegundos, tipo: cronoTipoActual });
  }

  function restablecerCrono() {
    detenerCrono();
    cronoSegundos = cronoOriginal;
    actualizarDisplayCrono();
    socket.emit('mesa-cronometro', { codigo: salaActual, accion: 'restablecer', duracion: cronoOriginal, tipo: cronoTipoActual });
  }

  function actualizarDisplayCrono() {
    const min = Math.floor(cronoSegundos / 60);
    const seg = cronoSegundos % 60;
    const el = document.getElementById('crono-display');
    el.textContent = `${min}:${seg.toString().padStart(2,'0')}`;
    el.className = 'cronometro-display';
    if (cronoSegundos <= 10 && cronoSegundos > 0) el.classList.add('rojo');
  }

  // ── FASE UI ──
  function actualizarFaseUI() {
    const badge = document.getElementById('fase-badge');
    const bloqueSorteo = document.getElementById('bloque-sorteo-1');
    const bloqueCreno = document.getElementById('bloque-crono');
    const bloqueNotas = document.getElementById('bloque-notas');

    bloqueSorteo.classList.add('hidden');
    bloqueCreno.classList.add('hidden');

    mostrarTurnoSimultaneo();

    if (faseActual === 'sorteo1') {
      badge.className = 'fase-badge sorteo';
      badge.textContent = '🎲 Sortear Poomsaes';
      bloqueSorteo.classList.remove('hidden');
      bloqueNotas.classList.add('hidden');

    } else if (faseActual === 'ejecucion1') {
      badge.className = 'fase-badge ejecucion';
      badge.textContent = '▶ Poomsae 1 · Ejecución';
      bloqueCreno.classList.remove('hidden');
      bloqueNotas.classList.remove('hidden');
      setCrono(90, 'ejecucion', '1ra Poomsae · Tiempo de Ejecución');
      notasDetalle = {};
      puntajesRecibidos = {};
      renderPuntajesBar({}, 'puntajes-bar');
      renderDetalleNotas();

    } else if (faseActual === 'ejecucion2') {
      badge.className = 'fase-badge ejecucion';
      badge.textContent = '▶ Poomsae 2 · Ejecución';
      bloqueCreno.classList.remove('hidden');
      bloqueNotas.classList.remove('hidden');
      setCrono(90, 'ejecucion', '2da Poomsae · Tiempo de Ejecución');
      notasDetalle = {};
      puntajesRecibidos = {};
      renderPuntajesBar({}, 'puntajes-bar');
      renderDetalleNotas();
    }
  }

  // ── MOSTRAR TURNO ──
  function mostrarTurnoSimultaneo() {
    const a = competidores[turnoIndex];
    const b = competidores[turnoIndex + 1];
    if (!a || !b) {
      document.getElementById('display-turno-sim').innerHTML = `
        <div class="turno-card" style="border-color:#22c55e">
          <div class="turno-nombre" style="color:#22c55e;font-size:20px">COMPETENCIA FINALIZADA</div>
        </div>`;
      return;
    }

    let poomsaeLine = '';
    if (faseActual === 'sorteo1' && poomsae1 && poomsae2) {
      poomsaeLine = `<div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:#c9a84c;margin-bottom:8px;border-bottom:1px solid #2a2a2a;padding-bottom:8px">
        1ra: ${poomsae1} &nbsp;·&nbsp; 2da: ${poomsae2}</div>`;
    } else if (['ejecucion1','calificacion1'].includes(faseActual) && poomsae1) {
      poomsaeLine = `<div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:#c9a84c;margin-bottom:8px;border-bottom:1px solid #2a2a2a;padding-bottom:8px">
        1ra: ${poomsae1}</div>`;
    } else if (['ejecucion2','resultado'].includes(faseActual) && poomsae2) {
      poomsaeLine = `<div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:#c9a84c;margin-bottom:8px;border-bottom:1px solid #2a2a2a;padding-bottom:8px">
        2da: ${poomsae2}</div>`;
    }

    document.getElementById('display-turno-sim').innerHTML = `
      <div class="turno-card">
        ${poomsaeLine}
        <div class="turno-label">Enfrentamiento</div>
        <div class="vs-row">
          <span class="turno-nombre" style="color:#ff6666">${a.nombre}</span>
          <span class="vs-sep">VS</span>
          <span class="turno-nombre" style="color:#6699ff">${b.nombre}</span>
        </div>
      </div>`;
    socket.emit('mesa-turno', { codigo: salaActual, turnoIndex, modo });
  }

  // ── NOTAS DETALLE ──
  function renderDetalleNotas() {
    const div = document.getElementById('detalle-notas');
    if (!div) return;
    if (Object.keys(notasDetalle).length === 0) {
      div.innerHTML = `<div style="font-size:10px;color:#444;text-align:center;padding:8px">Esperando notas de jueces...</div>`;
      return;
    }
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      const n = notasDetalle[i];
      if (!n) continue;
      html += `<div class="notas-juez">
        <div class="notas-juez-header">
          <span class="notas-juez-num">Juez ${i}</span>
          <span class="notas-juez-total">${(n.precision + n.vel + n.rit + n.exp).toFixed(2)}</span>
        </div>
        <div class="notas-juez-detalle">
          Prec: ${n.precision.toFixed(1)} &nbsp;·&nbsp;
          Vel: ${n.vel.toFixed(1)} &nbsp;·&nbsp;
          Rit: ${n.rit.toFixed(1)} &nbsp;·&nbsp;
          Exp: ${n.exp.toFixed(1)}
        </div>
      </div>`;
    }
    div.innerHTML = html;
  }

  // ── CALCULAR RESULTADO FINAL ──
  function calcularResultadoFinal() {
    const a = competidores[turnoIndex];
    const b = competidores[turnoIndex + 1];
    if (!a || !b) return;

    const totalA = (notasPoomsae1[a.id] || 0) + (notasPoomsae2[a.id] || 0);
    const totalB = (notasPoomsae1[b.id] || 0) + (notasPoomsae2[b.id] || 0);

    const ganador = totalA > totalB ? a.nombre : totalB > totalA ? b.nombre : 'EMPATE';
    const colorGanador = totalA > totalB ? '#ff6666' : totalB > totalA ? '#6699ff' : '#c9a84c';

    document.getElementById('bloque-resultado').classList.remove('hidden');
    document.getElementById('bloque-resultado').innerHTML = `
      <div class="resultado-final">
        <div style="font-size:9px;font-weight:700;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:10px">Resultado Final</div>
        <div style="display:flex;justify-content:space-around;margin-bottom:12px">
          <div style="text-align:center">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#ff6666">${a.nombre}</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff">${totalA.toFixed(2)}</div>
            <div style="font-size:9px;color:#555">P1: ${(notasPoomsae1[a.id]||0).toFixed(2)} · P2: ${(notasPoomsae2[a.id]||0).toFixed(2)}</div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:#333;align-self:center">VS</div>
          <div style="text-align:center">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#6699ff">${b.nombre}</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff">${totalB.toFixed(2)}</div>
            <div style="font-size:9px;color:#555">P1: ${(notasPoomsae1[b.id]||0).toFixed(2)} · P2: ${(notasPoomsae2[b.id]||0).toFixed(2)}</div>
          </div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:#555;margin-bottom:4px">GANADOR</div>
        <div class="resultado-ganador" style="color:${colorGanador}">🏆 ${ganador}</div>
      </div>`;

    document.getElementById('btn-siguiente-enfrentamiento').classList.remove('hidden');
    faseActual = 'resultado';
    mostrarTurnoSimultaneo();
    log(`Resultado: ${a.nombre} ${totalA.toFixed(2)} vs ${b.nombre} ${totalB.toFixed(2)} → ${ganador}`);
  }

  function siguienteEnfrentamiento() {
    turnoIndex += 2;
    poomsae1 = null; poomsae2 = null;
    notasPoomsae1 = {}; notasPoomsae2 = {};
    notasDetalle = {}; puntajesRecibidos = {};
    faseActual = 'sorteo1';
    const el1 = document.getElementById('display-p1');
    const el2 = document.getElementById('display-p2');
    if (el1) { el1.textContent = '— Sin sortear —'; el1.classList.add('vacio'); }
    if (el2) { el2.textContent = '— Sin sortear —'; el2.classList.add('vacio'); }
    document.getElementById('bloque-resultado').classList.add('hidden');
    document.getElementById('bloque-resultado').innerHTML = '';
    document.getElementById('btn-siguiente-enfrentamiento').classList.add('hidden');
    renderPuntajesBar({}, 'puntajes-bar');
    renderDetalleNotas();
    mostrarTurnoSimultaneo();
    actualizarFaseUI();
  }

  // ── TURNO GENERAL ──
  function mostrarTurnoActual() {
    puntajesRecibidos = {};
    renderPuntajesBar({}, 'puntajes-bar-gen');
    const div = document.getElementById('display-turno');
    if (modo === '1v1-secuencial') {
      const a = competidores[turnoIndex];
      const b = competidores[turnoIndex + 1];
      if (!a || !b) { finGen(); return; }
      div.innerHTML = `<div class="turno-card"><div class="turno-label">Secuencial</div>
        <div class="vs-row">
          <span class="turno-nombre" style="color:#ff6666">${a.nombre}</span>
          <span class="vs-sep">VS</span>
          <span class="turno-nombre" style="color:#6699ff">${b.nombre}</span>
        </div></div>`;
    } else {
      const c = competidores[turnoIndex];
      if (!c) { finGen(); return; }
      div.innerHTML = `<div class="turno-card"><div class="turno-label">${turnoIndex+1} de ${competidores.length}</div>
        <div class="turno-nombre">${c.nombre}</div></div>`;
    }
    document.getElementById('btn-revelar-gen').classList.remove('hidden');
    document.getElementById('btn-siguiente-gen').classList.add('hidden');
    socket.emit('mesa-turno', { codigo: salaActual, turnoIndex, modo });
  }

  function finGen() {
    document.getElementById('display-turno').innerHTML = `
      <div class="turno-card" style="border-color:#22c55e">
        <div class="turno-nombre" style="color:#22c55e;font-size:20px">COMPETENCIA FINALIZADA</div>
      </div>`;
    document.getElementById('btn-revelar-gen').classList.add('hidden');
    document.getElementById('btn-siguiente-gen').classList.add('hidden');
  }

  function revelarPuntajeGen() {
    socket.emit('mesa-revelar', { codigo: salaActual, turnoIndex });
    document.getElementById('btn-revelar-gen').classList.add('hidden');
    document.getElementById('btn-siguiente-gen').classList.remove('hidden');
  }

  function siguienteTurno() {
    turnoIndex += (modo === '1v1-secuencial') ? 2 : 1;
    mostrarTurnoActual();
  }

  function definirCorte() {
    const topN = parseInt(document.getElementById('input-topN').value);
    if (!topN) return alert('Ingresa cuántos pasan');
    socket.emit('mesa-corte', { codigo: salaActual, topN });
  }

  // ── RESTAURAR ──
  function restaurarSistema() {
    const ok = confirm('¿Restaurar el sistema? Se borrará la competencia actual.');
    if (!ok) return;
    socket.emit('mesa-restaurar', { codigo: salaActual });
  }

  // ── RENDER HELPERS ──
  function renderJueces(jueces) {
    const el = document.getElementById('display-jueces');
    if (!el) return;
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      const c = jueces.find(j => j.num === i);
      html += `<div class="juez-chip ${c?'activo':''}">
        <div class="juez-dot ${c?'activo':''}"></div>
        <span class="juez-txt">J${i}${c?.nombre?' · '+c.nombre:''}</span>
      </div>`;
    }
    el.innerHTML = html;
  }

  function renderPuntajesBar(recibidos, elId) {
    const el = document.getElementById(elId);
    if (!el) return;
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      html += `<div class="pj-chip ${recibidos[i]?'recibido':''}">J${i}</div>`;
    }
    el.innerHTML = html;
  }

  function renderRanking(ranking, topN) {
    const div = document.getElementById('display-ranking');
    if (!div) return;
    let html = '';
    ranking.forEach((c, i) => {
      let clase = topN ? (i < topN ? 'pasa' : 'fuera') : '';
      if (topN && i === topN) html += `<hr style="border-color:#c9a84c;margin:6px 0">`;
      html += `<div class="rank-item ${clase}">
        <span class="rank-pos">${i+1}</span>
        <span class="rank-nombre">${c.nombre}</span>
        <span class="rank-total">${c.total!==null?c.total.toFixed(2):'—'}</span>
      </div>`;
    });
    div.innerHTML = html;
  }

  function log(msg) {
    const div = document.getElementById('log');
    div.innerHTML += `<div>${new Date().toLocaleTimeString()} — ${msg}</div>`;
    div.scrollTop = div.scrollHeight;
  }

  // ── SOCKET ──
  socket.on('sala-creada', (data) => {
    document.getElementById('seccion-setup').classList.add('hidden');
    document.getElementById('seccion-sala').classList.remove('hidden');
    document.getElementById('display-codigo').textContent = data.codigo;
    document.getElementById('display-modo').textContent = `${data.tipo.toUpperCase()} · ${data.modo} · ${data.numJueces} JUECES`;
    document.getElementById('header-badge').textContent = data.codigo;
    document.getElementById('display-categoria').textContent = data.categoria;
    document.getElementById('display-ronda').textContent = data.ronda;
    renderJueces([]);
    log('Sala creada');
  });

  socket.on('juez-conectado', (data) => {
    renderJueces(data.jueces);
    log(`Juez ${data.numJuez} conectado: ${data.nombre||''}`);
  });

  socket.on('juez-desconectado', (data) => {
    renderJueces(data.jueces);
    log(`Juez ${data.numJuez} desconectado`);
  });

  socket.on('puntaje-recibido', (data) => {
    // Actualizar barra
    puntajesRecibidos[data.juezNum] = true;
    const barId = modo === '1v1-simultaneo' ? 'puntajes-bar' : 'puntajes-bar-gen';
    renderPuntajesBar(puntajesRecibidos, barId);

    // Guardar desglose
    if (data.desglose) {
      notasDetalle[data.juezNum] = {
        precision: data.desglose.precision,
        vel: data.desglose.vel,
        rit: data.desglose.rit,
        exp: data.desglose.exp
      };
      renderDetalleNotas();

      // Acumular por poomsae
      if (faseActual === 'ejecucion1') {
        if (!notasPoomsae1[data.competidorId]) notasPoomsae1[data.competidorId] = 0;
      } else if (faseActual === 'ejecucion2') {
        if (!notasPoomsae2[data.competidorId]) notasPoomsae2[data.competidorId] = 0;
      }
    }

    // Verificar si todos enviaron para ambos competidores
    if (modo === '1v1-simultaneo') {
      const a = competidores[turnoIndex];
      const b = competidores[turnoIndex + 1];
      if (a && b) {
        const todosListos = Object.keys(puntajesRecibidos).length >= numJueces * 2 ||
          (data.totalPuntajesA >= numJueces && data.totalPuntajesB >= numJueces);
        if (data.todosCompletos) {
          // Guardar totales
          if (faseActual === 'ejecucion1') {
            notasPoomsae1[a.id] = data.totalA || 0;
            notasPoomsae1[b.id] = data.totalB || 0;
            // Pasar a poomsae 2
            faseActual = 'ejecucion2';
            actualizarFaseUI();
          } else if (faseActual === 'ejecucion2') {
            notasPoomsae2[a.id] = data.totalA || 0;
            notasPoomsae2[b.id] = data.totalB || 0;
            calcularResultadoFinal();
          }
        }
      }
    }

    log(`✓ J${data.juezNum} (${data.totalPuntajes}/${data.numJueces})`);
  });

  socket.on('poomsae-sorteada', (data) => {
    log(`Poomsae ${data.numero}: ${data.poomsae}`);
  });

  socket.on('ranking-actualizado', (data) => { renderRanking(data.ranking, null); });
  socket.on('corte-aplicado', (data) => { renderRanking(data.ranking, data.topN); });

  socket.on('sistema-restaurado', () => {
    competidores = [];
    turnoIndex = 0;
    poomsae1 = null; poomsae2 = null;
    faseActual = 'sorteo1';
    puntajesRecibidos = {};
    notasDetalle = {};
    notasPoomsae1 = {}; notasPoomsae2 = {};
    const el1 = document.getElementById('display-p1');
    const el2 = document.getElementById('display-p2');
    if (el1) { el1.textContent = '— Sin sortear —'; el1.classList.add('vacio'); }
    if (el2) { el2.textContent = '— Sin sortear —'; el2.classList.add('vacio'); }
    document.getElementById('panel-control-simultaneo').classList.add('hidden');
    document.getElementById('panel-control').classList.add('hidden');
    document.getElementById('panel-ranking').classList.add('hidden');
    document.getElementById('panel-competidores').classList.remove('hidden');
    document.getElementById('lista-competidores').innerHTML = '';
    document.getElementById('bloque-resultado').classList.add('hidden');
    document.getElementById('btn-siguiente-enfrentamiento').classList.add('hidden');
    if (cronoInterval) { clearInterval(cronoInterval); cronoInterval = null; }
    log('Sistema restaurado');
  });
</script>
</body>
</html>
