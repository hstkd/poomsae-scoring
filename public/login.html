<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · Poomsae Scoring</title>
  <link href="/fonts/fonts.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      user-select: none;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 12px;
      color: #c9a84c; text-shadow: 0 0 40px rgba(201,168,76,0.35); line-height: 1; }
    .sub { font-size: 10px; font-weight: 700; letter-spacing: 6px; color: #555;
      text-transform: uppercase; margin-top: 2px; margin-bottom: 36px; }
    .card {
      background: #141414; border: 1px solid #222; border-radius: 16px;
      padding: 28px 24px; width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 14px;
    }
    label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: #777; text-transform: uppercase; }
    input {
      background: #0e0e0e; border: 1px solid #2a2a2a; border-radius: 10px;
      color: #fff; padding: 12px 16px; font-size: 16px; font-family: 'Inter', sans-serif;
      outline: none; width: 100%;
    }
    input:focus { border-color: #c9a84c; }
    button {
      background: #c9a84c; color: #000; border: none; margin-top: 6px;
      padding: 13px; font-family: 'Bebas Neue', sans-serif; font-size: 20px;
      letter-spacing: 4px; border-radius: 10px; cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .error { color: #ff6b6b; font-size: 12px; min-height: 16px; text-align: center; }
    .footer { margin-top: 28px; font-size: 9px; letter-spacing: 2px; color: #2a2a2a; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="logo">POOMSAE</div>
  <div class="sub">Acceso al sistema</div>

  <form class="card" id="form-login" autocomplete="off">
    <div>
      <label for="usuario">Usuario</label>
      <input id="usuario" name="usuario" type="text" autocapitalize="none" autocomplete="username" required>
    </div>
    <div>
      <label for="clave">Contraseña</label>
      <input id="clave" name="clave" type="password" autocomplete="current-password" required>
    </div>
    <div class="error" id="error"></div>
    <button type="submit">INGRESAR</button>
  </form>

  <div class="footer">Henry Sigchos Taekwondo · HSTKD</div>

  <script>
    const destinoPorRol = {
      admin: '/index.html',
      mesa: '/index.html',
      juez: '/juez.html',
      pantalla: '/pantalla.html',
    };
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      err.textContent = '';
      const username = document.getElementById('usuario').value.trim();
      const password = document.getElementById('clave').value;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await r.json();
        if (!r.ok) { err.textContent = data.error || 'No se pudo iniciar sesión'; return; }
        window.location.href = destinoPorRol[data.role] || '/index.html';
      } catch (e) {
        err.textContent = 'Error de conexión';
      }
    });
  </script>
</body>
</html>
