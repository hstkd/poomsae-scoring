<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla - Poomsae</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: white;
      font-family: 'Inter', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; user-select: none;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(90deg, #0a0a0a, #1a1a1a, #0a0a0a);
      border-bottom: 2px solid #c9a84c;
      padding: 8px 30px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 5px; color: #c9a84c; }
    .header-centro { font-size: 10px; font-weight: 700; letter-spacing: 4px; color: #555; text-transform: uppercase; text-align: center; }
    .header-derecha { display: flex; align-items: center; gap: 12px; }
    .header-sala { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 4px; color: #c9a84c; }
    .jueces-dots { display: flex; gap: 5px; align-items: center; }
    .jdot { width: 8px; height: 8px; border-radius: 50%; background: #222; border: 1px solid #333; transition: all 0.3s; }
    .jdot.activo { background: #22c55e; border-color: #22c55e; box-shadow: 0 0 6px #22c55e; }

    /* ── LOGIN ── */
    #overlay-login {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 16px; z-index: 999;
    }
    .login-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 60px; letter-spacing: 10px; color: #c9a84c; text-shadow: 0 0 40px rgba(201,168,76,0.4); }
    .login-sub { font-size: 10px; font-weight: 700; letter-spacing: 5px; color: #444; text-transform: uppercase; margin-top: -10px; }
    .login-input {
      background: #111; border: 1px solid #2a2a2a; border-radius: 10px;
      color: #fff; padding: 14px 24px; font-size: 28px;
      font-family: 'Bebas Neue', sans-serif; letter-spacing: 8px;
      outline: none; text-align: center; width: 320px;
    }
    .login-input:focus { border-color: #c9a84c; }
    .btn-login {
      background: #c9a84c; color: #000; border: none;
      padding: 14px 40px; font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 4px; border-radius: 10px; cursor: pointer;
    }

    /* ── ESPERA ── */
    #estado-espera {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 14px;
    }
    .espera-logo { font-family: 'Bebas Neue', sans-serif; font-size: 100px; letter-spacing: 14px; color: #141414; }
    .espera-sub { font-size: 10px; font-weight: 700; letter-spacing: 6px; color: #2a2a2a; text-transform: uppercase; }

    /* ── CUERPO ── */
    #cuerpo { flex: 1; display: flex; position: relative; overflow: hidden; }

    /* ── OVERLAY POOMSAE (sorteo y ejecución) ── */
    #overlay-poomsae {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 30; pointer-events: none;
      display: flex; justify-content: center;
    }
    .poomsae-banner {
      background: rgba(0,0,0,0.85); border-bottom: 2px solid #c9a84c;
      padding: 10px 40px; text-align: center; width: 100%;
    }
    .poomsae-banner-label {
      font-size: 9px; font-weight: 700; letter-spacing: 4px;
      color: #555; text-transform: uppercase; margin-bottom: 4px;
    }
    .poomsae-banner-nombre {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px; letter-spacing: 6px; color: #c9a84c;
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
    }
    .poomsae-banner-ambas {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 4px; color: #c9a84c;
    }

    /* Indicador de ronda activa */
.ronda-badge {
  position: fixed; top: 60px; right: 20px;
  z-index: 100; text-align: center; pointer-events: none;
  background: rgba(0,0,0,0.8); border: 1px solid #c9a84c;
  border-radius: 10px; padding: 8px 16px;
}
.ronda-badge-label {
  font-size: 8px; font-weight: 700; letter-spacing: 3px;
  color: #555; text-transform: uppercase; margin-bottom: 2px;
}
.ronda-badge-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 4px; color: #c9a84c; line-height: 1;
}

/* Scores de P1 fijos al pasar a P2 */
.scores-p1-fijos {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; gap: 20px; pointer-events: none;
}
.score-p1-chip {
  background: rgba(0,0,0,0.85); border: 1px solid #2a2a2a;
  border-radius: 8px; padding: 6px 16px; text-align: center;
}
.score-p1-chip-label {
  font-size: 8px; font-weight: 700; letter-spacing: 2px;
  color: #555; text-transform: uppercase; margin-bottom: 2px;
}
.score-p1-chip-nombre {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 2px; color: #888;
}
.score-p1-chip-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; letter-spacing: 2px; color: #c9a84c;
}

    /* ── ANIMACIÓN SORTEO ── */
    #overlay-sorteo {
      position: absolute; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 20px;
      z-index: 50;
    }
    .sorteo-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 6px; color: #555; text-transform: uppercase;
    }
    .sorteo-ruleta {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 60px; letter-spacing: 6px; color: #c9a84c;
      text-shadow: 0 0 30px rgba(201,168,76,0.6);
      min-height: 80px; display: flex; align-items: center;
    }
    .sorteo-resultado {
      display: flex; gap: 40px; justify-content: center; align-items: center;
    }
    .sorteo-card {
      text-align: center; background: #141414; border-radius: 16px;
      padding: 20px 30px; border: 1px solid #2a2a2a;
    }
    .sorteo-card.activa { border-color: #c9a84c; box-shadow: 0 0 20px rgba(201,168,76,0.3); }
    .sorteo-card-label {
      font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #555;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .sorteo-card-nombre {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: 4px; color: #c9a84c;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .fade-in { animation: fadeIn 0.4s ease-out; }

    /* ── CRONÓMETRO ── */
    #crono-wrap {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      z-index: 20; text-align: center; pointer-events: none;
    }
    .crono-label-txt {
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      color: #444; text-transform: uppercase; margin-bottom: 2px;
    }
    .crono-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 70px; letter-spacing: 6px; color: #c9a84c; line-height: 1;
      text-shadow: 0 0 30px rgba(201,168,76,0.5);
      background: rgba(0,0,0,0.75); border-radius: 10px; padding: 2px 18px;
    }
    .crono-display.urgente {
      color: #dc2626; text-shadow: 0 0 30px rgba(220,38,38,0.6);
      animation: parpadeo 0.5s infinite;
    }
    @keyframes parpadeo { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* ── JUECES STATUS ── */
    .jueces-bar {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 20;
    }
    .jcircle {
      width: 42px; height: 42px; border-radius: 50%;
      background: #111; border: 1px solid #222;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 12px;
      letter-spacing: 1px; color: #333; transition: all 0.3s;
    }
    .jcircle.listo { background: #16a34a; border-color: #22c55e; color: #fff; box-shadow: 0 0 12px rgba(34,197,94,0.5); }

    /* ── 1V1 ── */
    #vista-1v1 { flex: 1; display: none; }
    #vista-1v1.visible { display: flex; }

    .lado {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center; position: relative;
      transition: all 0.4s;
    }

    /* ROJO — izquierda */
    .lado-rojo {
      background: linear-gradient(135deg, #0d0000, #1a0505);
      border-right: 1px solid #3d0000;
    }
    .lado-rojo::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #dc2626, #ff6666);
    }
    .lado-rojo.ganador { background: linear-gradient(135deg, #2a0000, #3d0505); border-right-color: #dc2626; }
    .lado-rojo.perdedor { opacity: 0.25; }

    /* AZUL — derecha */
    .lado-azul {
      background: linear-gradient(225deg, #00000d, #05051a);
      border-left: 1px solid #00003d;
    }
    .lado-azul::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #3b82f6, #6699ff);
    }
    .lado-azul.ganador { background: linear-gradient(225deg, #00002a, #05053d); border-left-color: #3b82f6; }
    .lado-azul.perdedor { opacity: 0.25; }

    .comp-etiqueta {
      font-size: 9px; font-weight: 700; letter-spacing: 5px;
      color: #555; text-transform: uppercase; margin-bottom: 6px;
    }
    .comp-nombre-g {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px; letter-spacing: 4px; margin-bottom: 10px;
    }
    .lado-rojo .comp-nombre-g { color: #ff8888; }
    .lado-azul .comp-nombre-g { color: #8899ff; }

    /* Notas progresivas */
    .notas-progresivas {
      display: flex; flex-direction: column; gap: 4px;
      margin-bottom: 12px; width: 80%; max-width: 280px;
    }
    .nota-fila {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.04); border-radius: 6px; padding: 4px 10px;
      font-size: 11px; transition: all 0.3s;
    }
    .nota-fila.recibida { background: rgba(255,255,255,0.09); }
    .nota-juez-id { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; color: #555; }
    .nota-juez-id.recibida { color: #888; }
    .nota-juez-score { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #c9a84c; }
    .nota-juez-detalle { font-size: 9px; color: #444; }

    .comp-score-g {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 130px; line-height: 1; color: #c9a84c;
      text-shadow: 0 10px 40px rgba(201,168,76,0.3);
    }
    .comp-badge { margin-top: 16px; height: 36px; }
    .ganador-tag {
      font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 4px;
      background: #c9a84c; color: #000; padding: 6px 24px; border-radius: 30px;
    }

    .centro-vs {
      width: 100px; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: #0a0a0a;
      border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a;
    }
    .vs-txt { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 4px; color: #1a1a1a; }

    /* ── CUTOFF ── */
    #vista-cutoff { flex: 1; display: none; }
    #vista-cutoff.visible { display: grid; grid-template-columns: 1fr 320px; }
    .panel-turno {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: #0a0a0a; border-right: 1px solid #1a1a1a; padding: 40px;
    }
    .turno-etiqueta { font-size: 10px; font-weight: 700; letter-spacing: 5px; color: #444; text-transform: uppercase; margin-bottom: 12px; }
    .turno-nombre-grande { font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 6px; text-align: center; margin-bottom: 16px; }
    .turno-score-grande { font-family: 'Bebas Neue', sans-serif; font-size: 180px; line-height: 1; color: #c9a84c; text-shadow: 0 10px 60px rgba(201,168,76,0.4); }
    .panel-ranking { background: #0f0f0f; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow: hidden; }
    .ranking-header { padding: 14px 18px; border-bottom: 1px solid #1a1a1a; font-size: 9px; font-weight: 700; letter-spacing: 4px; color: #555; text-transform: uppercase; }
    .ranking-scroll { flex: 1; overflow-y: auto; padding: 10px; }
    .rank-item { display: flex; align-items: center; gap: 10px; background: #141414; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 5px; }
    .rank-pos { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #c9a84c; width: 28px; }
    .rank-nombre { flex: 1; font-size: 13px; font-weight: 700; }
    .rank-total { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #c9a84c; }
    .rank-item.pasa { border-left: 3px solid #22c55e; }
    .rank-item.fuera { border-left: 3px solid #dc2626; opacity: 0.4; }

    /* ── FOOTER ── */
    .footer {
      background: #0a0a0a; border-top: 1px solid #1a1a1a;
      padding: 6px 30px; display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .footer-txt { font-size: 9px; letter-spacing: 2px; color: #2a2a2a; text-transform: uppercase; }

    @keyframes revelar { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .revelar-anim { animation: revelar 0.5s cubic-bezier(0.34,1.56,0.64,1); }

    /* Animación ganador */
@keyframes ganador-brillo {
  0%,100% { box-shadow: 0 0 20px transparent; filter: brightness(1); }
  50%      { box-shadow: 0 0 80px rgba(201,168,76,0.9); filter: brightness(1.4); }
}
.lado.ganador { animation: ganador-brillo 0.8s ease-in-out infinite; }

.ganador-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: rgba(0,0,0,0.6); z-index: 10;
  animation: fadeIn 0.5s ease-out;
}
.ganador-texto-grande {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 120px; letter-spacing: 8px; color: #c9a84c;
  text-shadow: 0 0 40px rgba(201,168,76,0.8); line-height: 1;
}
.ganador-nombre-sub {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px; letter-spacing: 6px; color: #fff; margin-top: 8px;
}

/* Overlay resumen final */
#overlay-resumen {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 24px;
  z-index: 200;
}
.resumen-titulo-txt {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 6px; color: #555; text-transform: uppercase;
}
.resumen-grid {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px;
  align-items: center; width: 80%; max-width: 900px;
}
.resumen-comp-card {
  border-radius: 16px; padding: 24px; text-align: center;
  animation: ganador-brillo 0.8s ease-in-out infinite;
}
.resumen-comp-card.rojo-card {
  background: linear-gradient(135deg,#2a0000,#3d0505);
  border: 2px solid #dc2626;
}
.resumen-comp-card.azul-card {
  background: linear-gradient(135deg,#00002a,#05053d);
  border: 2px solid #3b82f6;
}
.resumen-comp-card.perdedor-card {
  animation: none; opacity: 0.4;
}
.resumen-comp-nombre {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 4px; margin-bottom: 16px;
}
.resumen-comp-card.rojo-card .resumen-comp-nombre { color: #ff8888; }
.resumen-comp-card.azul-card .resumen-comp-nombre { color: #8899ff; }
.resumen-fila-score {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
}
.resumen-fila-label { color: #555; letter-spacing: 2px; text-transform: uppercase; font-size: 10px; }
.resumen-fila-val {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #c9a84c;
}
.resumen-promedio {
  margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.15);
}
.resumen-promedio-label {
  font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #555;
  text-transform: uppercase; margin-bottom: 4px;
}
.resumen-promedio-val {
  font-family: 'Bebas Neue', sans-serif; font-size: 60px; color: #fff; line-height: 1;
}
.resumen-vs {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #222; text-align: center;
}
.resumen-ganador-banner {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 6px; color: #c9a84c;
  text-align: center; animation: fadeIn 0.6s ease-out;
}

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="overlay-login">
  <div class="login-titulo">POOMSAE</div>
  <div class="login-sub">Pantalla de Resultados</div>
  <input class="login-input" id="input-sala" type="text" maxlength="8"
    placeholder="CÓDIGO" style="text-transform:uppercase"
    onkeydown="if(event.key==='Enter') conectar()">
  <button class="btn-login" onclick="conectar()">CONECTAR</button>
</div>

<!-- HEADER -->
<div class="header hidden" id="header">
  <div class="header-logo">POOMSAE</div>
  <div class="header-centro" id="header-centro">—</div>
  <div class="header-derecha">
    <div class="header-sala" id="header-sala">—</div>
    <div class="jueces-dots" id="jueces-dots"></div>
  </div>
</div>

<!-- ESPERA -->
<div id="estado-espera" class="hidden">
  <div class="espera-logo">POOMSAE</div>
  <div class="espera-sub" id="espera-sub">Esperando inicio</div>
</div>
<!-- CRONÓMETRO — fuera del cuerpo para que siempre sea visible -->
<div id="crono-wrap" class="hidden" style="
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  z-index:100; text-align:center; pointer-events:none;">
  <div class="crono-label-txt" id="crono-label">Tiempo de Ejecución</div>
  <div class="crono-display" id="crono-display">1:30</div>
</div>

  <!-- RONDA ACTIVA -->
<div id="ronda-badge" class="ronda-badge hidden">
  <div class="ronda-badge-label">Ronda activa</div>
  <div class="ronda-badge-num" id="ronda-badge-num">—</div>
</div>

<!-- SCORES P1 FIJOS -->
<div id="scores-p1-fijos" class="scores-p1-fijos hidden">
  <div class="score-p1-chip">
    <div class="score-p1-chip-label">Poomsae 1</div>
    <div class="score-p1-chip-nombre" id="p1-nombre-A">—</div>
    <div class="score-p1-chip-val" id="p1-score-A">—</div>
  </div>
  <div class="score-p1-chip">
    <div class="score-p1-chip-label">Poomsae 1</div>
    <div class="score-p1-chip-nombre" id="p1-nombre-B">—</div>
    <div class="score-p1-chip-val" id="p1-score-B">—</div>
  </div>
</div>

<!-- CUERPO -->
<div id="cuerpo" class="hidden">

  <!-- OVERLAY POOMSAE -->
  <div id="overlay-poomsae" class="hidden">
    <div class="poomsae-banner" id="poomsae-banner-inner"></div>
  </div>

  <!-- OVERLAY SORTEO (animación) -->
  <div id="overlay-sorteo" class="hidden">
    <div class="sorteo-titulo">Sorteando poomsaes</div>
    <div class="sorteo-ruleta" id="sorteo-ruleta">—</div>
    <div class="sorteo-resultado hidden" id="sorteo-resultado">
      <div class="sorteo-card" id="sorteo-card-1">
        <div class="sorteo-card-label">1ra Poomsae</div>
        <div class="sorteo-card-nombre" id="sorteo-p1">—</div>
      </div>
      <div class="sorteo-card" id="sorteo-card-2">
        <div class="sorteo-card-label">2da Poomsae</div>
        <div class="sorteo-card-nombre" id="sorteo-p2">—</div>
      </div>
    </div>
  </div>

  <!-- JUECES STATUS -->
  <div class="jueces-bar" id="jueces-bar"></div>

    <!-- 1V1 -->
  <div id="vista-1v1">
    <div class="lado lado-rojo" id="panel-B">
      <div class="comp-etiqueta" style="color:#dc262655">Competidor Rojo</div>
      <div class="comp-nombre-g" id="nombre-B">—</div>
      <div class="notas-progresivas" id="notas-B"></div>
      <div class="comp-score-g" id="score-B">—</div>
      <div class="comp-badge" id="badge-B"></div>
    </div>
    <div class="centro-vs"><div class="vs-txt">VS</div></div>
    <div class="lado lado-azul" id="panel-A">
      <div class="comp-etiqueta" style="color:#3b82f655">Competidor Azul</div>
      <div class="comp-nombre-g" id="nombre-A">—</div>
      <div class="notas-progresivas" id="notas-A"></div>
      <div class="comp-score-g" id="score-A">—</div>
      <div class="comp-badge" id="badge-A"></div>
    </div>
  </div>


  <!-- CUTOFF -->
  <div id="vista-cutoff">
    <div class="panel-turno">
      <div class="turno-etiqueta" id="turno-etiqueta">—</div>
      <div class="turno-nombre-grande" id="turno-nombre">—</div>
      <div class="turno-score-grande" id="turno-score">—</div>
    </div>
    <div class="panel-ranking">
      <div class="ranking-header">Ranking</div>
      <div class="ranking-scroll" id="ranking-lista"></div>
    </div>
  </div>

</div>
<!-- OVERLAY RESUMEN FINAL -->
<div id="overlay-resumen" class="hidden"></div>

<!-- FOOTER -->
<div class="footer hidden" id="footer">
  <div class="footer-txt">Poomsae Scoring System</div>
  <div class="footer-txt" id="footer-modo">—</div>
  <div class="footer-txt" id="footer-estado">⬤ En vivo</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io({
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000
  });

  // ── ESTADO LOCAL ──
  let salaInfo = {};
  let numJueces = 3;
  let juecesConectados = [];
  let topNActual = null;
  let poomsaeActiva = null; // '1' | '2' | 'ambas'

  // Notas recibidas: { A: {1: score, 2: score...}, B: {...} }
  let notasRecibidas = { A: {}, B: {} };
  let compIdA = null, compIdB = null; // IDs del servidor

  // Poomsaes sorteadas
  let poomsae1 = null, poomsae2 = null;

  // Lista de poomsaes para animación (hardcoded igual que server/mesa)
  const POOMSAES_TODAS = ['Taegeuk 4','Taegeuk 5','Taegeuk 6','Taegeuk 7','Taegeuk 8',
    'Koryo','Keumgang','Taebaek','Pyongwon','Sipjin','Jitae','Cheonkwon','Hansu','Ilyeo'];

  // ── CONECTAR ──
  function conectar() {
    const codigo = document.getElementById('input-sala').value.trim().toUpperCase();
    if (!codigo) return;
    socket.emit('juez-unirse', { codigo, nombre: 'Pantalla', numJuez: 0 });
  }

  // ── ANIMACIÓN DE SORTEO ──
  let sorteoP1 = null, sorteoP2 = null;
  let sorteoTimer = null;

  function animarSorteo(p1final, p2final) {
    poomsae1 = p1final;
    poomsae2 = p2final;

    // Mostrar overlay de sorteo
    document.getElementById('overlay-sorteo').classList.remove('hidden');
    document.getElementById('sorteo-resultado').classList.add('hidden');
    document.getElementById('sorteo-ruleta').textContent = '—';

    const ruleta = document.getElementById('sorteo-ruleta');
    let count = 0;
    const totalFrames = 30;
    const intervalo = setInterval(() => {
      ruleta.textContent = POOMSAES_TODAS[Math.floor(Math.random() * POOMSAES_TODAS.length)];
      count++;
      if (count >= totalFrames) {
        clearInterval(intervalo);
        // Mostrar resultado final
        document.getElementById('sorteo-p1').textContent = p1final;
        document.getElementById('sorteo-p2').textContent = p2final;
        document.getElementById('sorteo-resultado').classList.remove('hidden');
        document.getElementById('sorteo-resultado').classList.add('fade-in');
        document.getElementById('sorteo-card-1').classList.add('activa');
        ruleta.textContent = '';

        // Ocultar después de 4 segundos y mostrar banner
        sorteoTimer = setTimeout(() => {
          document.getElementById('overlay-sorteo').classList.add('hidden');
          mostrarBannerAmbas();
        }, 4000);
      }
    }, 80);
  }

  function mostrarBannerAmbas() {
    const banner = document.getElementById('overlay-poomsae');
    const inner = document.getElementById('poomsae-banner-inner');
    inner.innerHTML = `
      <div class="poomsae-banner-label">Poomsaes del enfrentamiento</div>
      <div class="poomsae-banner-ambas">
        1ra: ${poomsae1 || '—'} &nbsp;·&nbsp; 2da: ${poomsae2 || '—'}
      </div>`;
    banner.classList.remove('hidden');
    poomsaeActiva = 'ambas';
  }

  function mostrarBannerUna(num, nombre) {
    const banner = document.getElementById('overlay-poomsae');
    const inner = document.getElementById('poomsae-banner-inner');
    inner.innerHTML = `
      <div class="poomsae-banner-label">${num === 1 ? '1ra' : '2da'} Poomsae</div>
      <div class="poomsae-banner-nombre">${nombre}</div>`;
    banner.classList.remove('hidden');
    poomsaeActiva = String(num);
  }

  function ocultarBanner() {
    document.getElementById('overlay-poomsae').classList.add('hidden');
  }

  // ── NOTAS PROGRESIVAS ──
  function initNotasGrid(suffix) {
    const div = document.getElementById(`notas-${suffix}`);
    if (!div) return;
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      html += `<div class="nota-fila" id="nota-${suffix}-${i}">
        <span class="nota-juez-id" id="nota-id-${suffix}-${i}">J${i}</span>
        <span class="nota-juez-detalle" id="nota-det-${suffix}-${i}"></span>
        <span class="nota-juez-score" id="nota-score-${suffix}-${i}">—</span>
      </div>`;
    }
    div.innerHTML = html;
    notasRecibidas[suffix] = {};
  }

    function mostrarRonda(num) {
    const badge = document.getElementById('ronda-badge');
    const numEl = document.getElementById('ronda-badge-num');
    if (!badge || !numEl) return;
    numEl.textContent = `POOMSAE ${num}`;
    badge.classList.remove('hidden');
  }

  function ocultarRonda() {
    document.getElementById('ronda-badge')?.classList.add('hidden');
  }

  function guardarScoresP1() {
    const scoreA = document.getElementById('score-A')?.textContent;
    const scoreB = document.getElementById('score-B')?.textContent;
    const nomA = document.getElementById('nombre-A')?.textContent;
    const nomB = document.getElementById('nombre-B')?.textContent;
    if (scoreA && scoreA !== '—') {
      document.getElementById('p1-score-A').textContent = scoreA;
      document.getElementById('p1-nombre-A').textContent = nomA || '—';
      document.getElementById('p1-score-B').textContent = scoreB || '—';
      document.getElementById('p1-nombre-B').textContent = nomB || '—';
      document.getElementById('scores-p1-fijos').classList.remove('hidden');
    }
  }

  function ocultarScoresP1() {
    document.getElementById('scores-p1-fijos')?.classList.add('hidden');
  }

  function actualizarNotaGrid(suffix, juezNum, desglose, totalComp) {
    const fila = document.getElementById(`nota-${suffix}-${juezNum}`);
    const idEl = document.getElementById(`nota-id-${suffix}-${juezNum}`);
    const detEl = document.getElementById(`nota-det-${suffix}-${juezNum}`);
    const scoreEl = document.getElementById(`nota-score-${suffix}-${juezNum}`);
    if (!fila || !scoreEl) return;

    const prec = (desglose?.prec || 0).toFixed(1);
    const vel  = (desglose?.vel  || 0).toFixed(1);
    const rit  = (desglose?.rit  || 0).toFixed(1);
    const exp  = (desglose?.exp  || 0).toFixed(1);
    const subtot = ((desglose?.prec||0)+(desglose?.vel||0)+(desglose?.rit||0)+(desglose?.exp||0)).toFixed(2);

    fila.classList.add('recibida');
    if (idEl) idEl.classList.add('recibida');
    if (detEl) detEl.textContent = `${prec} / ${vel} ${rit} ${exp}`;
    scoreEl.textContent = subtot;
    notasRecibidas[suffix][juezNum] = parseFloat(subtot);

    // Actualizar score total si llegó
    if (totalComp !== null && totalComp !== undefined) {
      const scoreG = document.getElementById(`score-${suffix}`);
      if (scoreG) {
        scoreG.textContent = totalComp.toFixed(2);
        scoreG.classList.add('revelar-anim');
        setTimeout(() => scoreG.classList.remove('revelar-anim'), 500);
      }
    }
  }

  // ── HELPERS ── 
  function renderDots(jueces) {
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      const activo = jueces.find(j => j.num === i);
      html += `<div class="jdot ${activo ? 'activo' : ''}"></div>`;
    }
    document.getElementById('jueces-dots').innerHTML = html;
  }

  function renderJuecesBar(recibidos) {
    let html = '';
    for (let i = 1; i <= numJueces; i++) {
      html += `<div class="jcircle ${recibidos[i] ? 'listo' : ''}">J${i}</div>`;
    }
    document.getElementById('jueces-bar').innerHTML = html;
  }

  function renderRanking(ranking, topN) {
    const lista = document.getElementById('ranking-lista');
    let html = '';
    ranking.forEach((c, i) => {
      let clase = '';
      if (topN != null) clase = i < topN ? 'pasa' : 'fuera';
      if (topN != null && i === topN) html += `<div style="border-top:1px dashed #c9a84c;margin:6px 0"></div>`;
      html += `<div class="rank-item ${clase}">
        <span class="rank-pos">${i+1}</span>
        <span class="rank-nombre">${c.nombre}</span>
        <span class="rank-total">${c.total != null ? c.total.toFixed(2) : '—'}</span>
      </div>`;
    });
    lista.innerHTML = html;
  }

  function resetVista1v1() {
    document.getElementById('score-A').textContent = '—';
    document.getElementById('score-B').textContent = '—';
    document.getElementById('badge-A').innerHTML = '';
    document.getElementById('badge-B').innerHTML = '';
    document.getElementById('panel-A').className = 'lado lado-azul';
    document.getElementById('panel-B').className = 'lado lado-rojo';
    initNotasGrid('A');
    initNotasGrid('B');
  }

    // Guardar scores por poomsae para resumen
  function registrarScorePoomsae(poomsaeNum) {
    const sA = document.getElementById('score-A')?.textContent;
    const sB = document.getElementById('score-B')?.textContent;
    if (poomsaeNum === 1) {
      scoreP1A = sA !== '—' && sA ? parseFloat(sA) : null;
      scoreP1B = sB !== '—' && sB ? parseFloat(sB) : null;
    } else {
      scoreP2A = sA !== '—' && sA ? parseFloat(sA) : null;
      scoreP2B = sB !== '—' && sB ? parseFloat(sB) : null;
    }
  }

  function mostrarResumenFinal() {
    const nomA = document.getElementById('nombre-A')?.textContent || '—';
    const nomB = document.getElementById('nombre-B')?.textContent || '—';
    const p1A = scoreP1A ?? 0, p1B = scoreP1B ?? 0;
    const p2A = scoreP2A ?? 0, p2B = scoreP2B ?? 0;
    const promA = Math.round(((p1A + p2A) / 2) * 100) / 100;
    const promB = Math.round(((p1B + p2B) / 2) * 100) / 100;

    const ganadorA = promA > promB;
    const ganadorB = promB > promA;
    const empate   = promA === promB;

    const claseA = ganadorA ? 'azul-card' : 'azul-card perdedor-card';
    const claseB = ganadorB ? 'rojo-card' : 'rojo-card perdedor-card';
    const bannerTxt = empate ? '⚖️ EMPATE' :
      ganadorA ? `🏆 GANADOR — ${nomA}` : `🏆 GANADOR — ${nomB}`;

    document.getElementById('overlay-resumen').innerHTML = `
      <div class="resumen-titulo-txt">Resultado Final</div>
      <div class="resumen-grid">

        <div class="resumen-comp-card rojo-card ${ganadorB ? 'perdedor-card' : ''}">
          <div class="resumen-comp-nombre">${nomB}</div>
          <div class="resumen-fila-score">
            <span class="resumen-fila-label">Poomsae 1</span>
            <span class="resumen-fila-val">${p1B.toFixed(2)}</span>
          </div>
          <div class="resumen-fila-score">
            <span class="resumen-fila-label">Poomsae 2</span>
            <span class="resumen-fila-val">${p2B.toFixed(2)}</span>
          </div>
          <div class="resumen-promedio">
            <div class="resumen-promedio-label">Promedio Final</div>
            <div class="resumen-promedio-val">${promB.toFixed(2)}</div>
          </div>
          ${ganadorB ? '<div class="ganador-texto-grande" style="font-size:60px;margin-top:10px">GANADOR</div>' : ''}
        </div>

        <div class="resumen-vs">VS</div>

        <div class="resumen-comp-card azul-card ${ganadorA ? '' : 'perdedor-card'}">
          <div class="resumen-comp-nombre">${nomA}</div>
          <div class="resumen-fila-score">
            <span class="resumen-fila-label">Poomsae 1</span>
            <span class="resumen-fila-val">${p1A.toFixed(2)}</span>
          </div>
          <div class="resumen-fila-score">
            <span class="resumen-fila-label">Poomsae 2</span>
            <span class="resumen-fila-val">${p2A.toFixed(2)}</span>
          </div>
          <div class="resumen-promedio">
            <div class="resumen-promedio-label">Promedio Final</div>
            <div class="resumen-promedio-val">${promA.toFixed(2)}</div>
          </div>
          ${ganadorA ? '<div class="ganador-texto-grande" style="font-size:60px;margin-top:10px">GANADOR</div>' : ''}
        </div>

      </div>
      <div class="resumen-ganador-banner">${bannerTxt}</div>
    `;
    document.getElementById('overlay-resumen').classList.remove('hidden');
  }

  function ocultarResumenFinal() {
    document.getElementById('overlay-resumen').classList.add('hidden');
    document.getElementById('overlay-resumen').innerHTML = '';
    scoreP1A = null; scoreP1B = null;
    scoreP2A = null; scoreP2B = null;
  }

  // ── SOCKET EVENTS ──

  socket.on('juez-ok', (data) => {
    salaInfo = data.sala;
    numJueces = salaInfo.numJueces;
    document.getElementById('overlay-login').classList.add('hidden');
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('estado-espera').classList.remove('hidden');
    document.getElementById('footer').classList.remove('hidden');
    document.getElementById('header-sala').textContent = salaInfo.codigo;
    document.getElementById('header-centro').textContent =
      `${salaInfo.categoria || ''} · ${salaInfo.ronda || ''} · ${salaInfo.tipo?.toUpperCase()}`;
    document.getElementById('footer-modo').textContent =
      `${salaInfo.tipo?.toUpperCase()} · ${salaInfo.modo} · ${numJueces} jueces`;
    document.getElementById('espera-sub').textContent =
      `${salaInfo.tipo?.toUpperCase()} · ${salaInfo.modo}`;
    renderDots([]);
    renderJuecesBar({});
  });

  socket.on('juez-conectado', (data) => {
    juecesConectados = data.jueces;
    renderDots(data.jueces);
  });
  socket.on('juez-desconectado', (data) => {
    juecesConectados = data.jueces;
    renderDots(data.jueces);
  });

  socket.on('competencia-iniciada', (data) => {
    salaInfo.tipo = data.tipo;
    salaInfo.modo = data.modo;
    document.getElementById('estado-espera').classList.add('hidden');
    document.getElementById('cuerpo').classList.remove('hidden');
    if (data.modo === '1v1-simultaneo' || data.modo === '1v1-secuencial') {
      document.getElementById('vista-1v1').classList.add('visible');
      document.getElementById('vista-cutoff').classList.remove('visible');
    } else {
      document.getElementById('vista-cutoff').classList.add('visible');
      document.getElementById('vista-1v1').classList.remove('visible');
    }
  });

  socket.on('turno-actualizado', (data) => {
    const turno = data.turno;
    renderJuecesBar({});

    if (turno.tipo === '1v1-simultaneo' || turno.tipo === '1v1-secuencial') {
      // Guardar IDs para mapear puntajes
      compIdA = turno.competidorA?.id;
      compIdB = turno.competidorB?.id;
      document.getElementById('nombre-A').textContent = turno.competidorA?.nombre || '—';
      document.getElementById('nombre-B').textContent = turno.competidorB?.nombre || '—';
      resetVista1v1();
    } else {
      document.getElementById('turno-etiqueta').textContent = `Competidor ${turno.numero} de ${turno.total}`;
      document.getElementById('turno-nombre').textContent = turno.competidor?.nombre || '—';
      document.getElementById('turno-score').textContent = '—';
    }
  });

  // ── SORTEO ── animación cuando llegan ambas poomsaes
  let poomsaeBuffer = {};
  socket.on('poomsae-sorteada', (data) => {
    poomsaeBuffer[data.numero] = data.poomsae;
    if (poomsaeBuffer[1] && poomsaeBuffer[2]) {
      animarSorteo(poomsaeBuffer[1], poomsaeBuffer[2]);
      poomsaeBuffer = {};
    }
  });

  // ── CONTROL DE MESA ── maneja fase y banner
  socket.on('control-actualizado', (data) => {
    const { accion, fase, poomsae, esReconexion } = data;

    if (accion === 'iniciar') {
      // Ocultar banner de ambas poomsaes, mostrar solo la activa
      if (fase === 'p1_corriendo') {
        mostrarBannerUna(1, poomsae1);
        mostrarRonda(1);
      } else if (fase === 'p2_corriendo') {
        mostrarBannerUna(2, poomsae2);
        mostrarRonda(2)
      }
      document.getElementById('footer-estado').textContent = '▶ En ejecución';

    } else if (accion === 'detener') {
      document.getElementById('crono-wrap').classList.add('hidden');
      document.getElementById('footer-estado').textContent = '⏸ Jueces califican';

    } else if (accion === 'restablecer') {
      document.getElementById('footer-estado').textContent = '⬤ En vivo';

    } else if (accion === 'nueva-poomsae') {
     registrarScorePoomsae(1)
      guardarScoresP1()
      // Poomsae 2
      poomsae2 = poomsae || poomsae2;
      resetVista1v1();
      mostrarBannerAmbas();
      mostrarRonda(2)
      document.getElementById('crono-wrap').classList.add('hidden');
      document.getElementById('footer-estado').textContent = '⬤ En vivo';

    } else if (accion === 'nueva-competencia') {
      ocultarResumenFinal()
      ocultarRonda()
      ocultarScoresP1()
      // Nuevo enfrentamiento
      poomsae1 = null; poomsae2 = null;
      poomsaeBuffer = {};
      resetVista1v1();
      ocultarBanner();
      document.getElementById('crono-wrap').classList.add('hidden');
      document.getElementById('footer-estado').textContent = '⬤ En vivo';
    }

    // Reconexión: restaurar estado visual
    if (esReconexion && data.poomsae1) {
      poomsae1 = data.poomsae1;
      poomsae2 = data.poomsae2;
      if (fase && fase.startsWith('p1')) mostrarBannerUna(1, poomsae1);
      else if (fase && fase.startsWith('p2')) mostrarBannerUna(2, poomsae2);
    }
  });

  // ── CRONÓMETRO ──
  socket.on('cronometro-update', (data) => {
    const wrap = document.getElementById('crono-wrap');
    const el = document.getElementById('crono-display');
    const label = document.getElementById('crono-label');
    if (!el || !wrap) return;

    if (data.accion === 'fin' || data.accion === 'detener') {
      wrap.classList.add('hidden');
      return;
    }
    if (data.accion === 'restablecer') {
      wrap.classList.add('hidden');
      return;
    }

    wrap.classList.remove('hidden');
    const min = Math.floor(data.duracion / 60);
    const seg = data.duracion % 60;
    el.textContent = `${min}:${seg.toString().padStart(2,'0')}`;
    el.className = 'crono-display';
    if (data.duracion <= 10 && data.duracion > 0) el.classList.add('urgente');

    // Label según fase
    if (salaInfo.modo === '1v1-simultaneo') {
      label.textContent = poomsaeActiva === '2' ? '2da Poomsae' : '1ra Poomsae';
    }
  });

  // ── PUNTAJE RECIBIDO — notas progresivas ──
  socket.on('puntaje-recibido', (data) => {
    if (!data.desglose) return;

    const suffix = data.competidorId === compIdA ? 'A' : 'B';
    actualizarNotaGrid(suffix, data.juezNum, data.desglose, data.totalComp);
    // Cuando llega el totalComp de P2 para ambos competidores, mostrar resumen
    if (data.poomsae === 2 && data.totalComp !== null) {
      registrarScorePoomsae(2);
      const sA = scoreP2A ?? parseFloat(document.getElementById('score-A')?.textContent || '0');
      const sB = scoreP2B ?? parseFloat(document.getElementById('score-B')?.textContent || '0');
      if (sA > 0 && sB > 0) {
        setTimeout(() => mostrarResumenFinal(), 1500);
      }
    }

    // Actualizar círculos de jueces
    const received = {};
    Object.keys(notasRecibidas.A).forEach(j => received[j] = true);
    Object.keys(notasRecibidas.B).forEach(j => received[j] = true);
    renderJuecesBar(received);
  });

  // Variables para resumen
  let scoreP1A = null, scoreP1B = null;
  let scoreP2A = null, scoreP2B = null;
  let fasePuntaje = 1; // 1 o 2

  socket.on('puntaje-revelado', (data) => {
    if (data.tipo === '1v1') {
      const ta = data.competidorA?.total;
      const tb = data.competidorB?.total;

      if (ta != null) {
        const sa = document.getElementById('score-A');
        sa.textContent = ta.toFixed(2);
        sa.classList.add('revelar-anim');
        setTimeout(() => sa.classList.remove('revelar-anim'), 500);
      }
      if (tb != null) {
        const sb = document.getElementById('score-B');
        sb.textContent = tb.toFixed(2);
        sb.classList.add('revelar-anim');
        setTimeout(() => sb.classList.remove('revelar-anim'), 500);
      }

      // No mostrar ganador aquí — el resumen final lo hace
    } else {
      const score = document.getElementById('turno-score');
      score.textContent = data.competidor?.total != null ? data.competidor.total.toFixed(2) : '—';
      score.classList.add('revelar-anim');
      setTimeout(() => score.classList.remove('revelar-anim'), 600);
      if (data.ranking) renderRanking(data.ranking, topNActual);
    }
  });


  socket.on('ranking-actualizado', (data) => { renderRanking(data.ranking, topNActual); });
  socket.on('corte-aplicado', (data) => { topNActual = data.topN; renderRanking(data.ranking, data.topN); });

  socket.on('sala-finalizada', () => {
        ocultarResumenFinal();

    document.getElementById('cuerpo').classList.add('hidden');
    document.getElementById('header').classList.add('hidden');
    document.getElementById('footer').classList.add('hidden');
    document.getElementById('estado-espera').classList.add('hidden');
    document.getElementById('overlay-login').classList.remove('hidden');
    salaInfo = {};
  });

  socket.on('disconnect', () => {
    document.getElementById('footer-estado').textContent = '● Reconectando...';
  });
  socket.on('reconnect', () => {
    document.getElementById('footer-estado').textContent = '⬤ En vivo';
    if (salaInfo.codigo) {
      socket.emit('juez-unirse', { codigo: salaInfo.codigo, nombre: 'Pantalla', numJuez: 0 });
    }
  });
</script>
</body>
</html>
